<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>DeutschMates — Echtes Deutsch. Kein Lehrbuch.</title>
<meta name="description" content="DeutschMates — echtes gesprochenes Deutsch: Slang, Umgangssprache & Redewendungen mit Audio, 20 Dialogen und Alltags-Übungen.">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23000'/%3E%3Crect x='5' y='6' width='14' height='3.3' rx='1' fill='%23F4F3EF'/%3E%3Crect x='5' y='10.3' width='14' height='3.3' rx='1' fill='%23E1001A'/%3E%3Crect x='5' y='14.6' width='14' height='3.3' rx='1' fill='%23FFCB05'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E1001A; --red-deep:#B80016; --gold:#FFCB05; --gold-deep:#E6A800;
  --ink:#16161D; --ink-2:#21212B;
  --bg:#F6F5F1; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#F0EFE9;
  --text:#17171F; --text-2:#56565F; --text-3:#8A8A95;
  --border:#E7E5DF; --border-2:#D8D6CE;
  --shadow:0 1px 2px rgba(20,20,30,.04),0 10px 28px rgba(20,20,30,.07);
  --shadow-lg:0 18px 50px rgba(20,20,30,.16);
  --green:#15A34A; --green-soft:#DCFCE7; --rose:#E11D48; --rose-soft:#FFE4E6;
  --blue:#2563EB; --purple:#7C3AED; --radius:20px; --radius-sm:13px;
  --nav-w:256px; --ease:cubic-bezier(.22,1,.36,1); --ease-2:cubic-bezier(.34,1.56,.64,1);
  --maxw:1200px; --flag:linear-gradient(180deg,#16161D 0 33%,#E1001A 33% 66%,#FFCB05 66% 100%);
}
:root[data-theme="dark"]{
  --ink:#000000; --ink-2:#15151A; --bg:#000000; --bg-2:#08080B; --surface:#121217; --surface-2:#1C1C22;
  --text:#F4F3EF; --text-2:#A6A6AE; --text-3:#6E6E78; --gray:#56565F;
  --border:#23232B; --border-2:#30303A;
  --shadow:0 1px 2px rgba(0,0,0,.5),0 12px 34px rgba(0,0,0,.6);
  --shadow-lg:0 20px 60px rgba(0,0,0,.72);
  --green-soft:#0c2c1a; --rose-soft:#341018;
  --flag:linear-gradient(180deg,#F4F3EF 0 33%,#E1001A 33% 66%,#FFCB05 66% 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s var(--ease),color .4s var(--ease)}
body[dir="rtl"]{font-family:'Vazirmatn','Inter',Tahoma,sans-serif}
h1,h2,h3,h4{font-family:'Space Grotesk','Inter',sans-serif;line-height:1.12;letter-spacing:-.02em}
body[dir="rtl"] h1,body[dir="rtl"] h2,body[dir="rtl"] h3{font-family:'Vazirmatn','Space Grotesk',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--gold);color:var(--ink)}
.mono{font-family:'JetBrains Mono',monospace}
.de-phrase{font-weight:700}
.hidden{display:none!important}.center{text-align:center}.muted{color:var(--text-2)}

/* ---------- SPLASH ---------- */
#splash{position:fixed;inset:0;z-index:1000;background:var(--ink);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;transition:opacity .7s var(--ease),visibility .7s}
#splash.gone{opacity:0;visibility:hidden}
#splash::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(225,0,26,.22),transparent 60%),radial-gradient(circle at 80% 70%,rgba(255,203,5,.1),transparent 50%)}
.splash-logo{transform:scale(.6);opacity:0;animation:splashIn 1s var(--ease-2) .15s forwards;z-index:2}
.splash-tag{color:#9a98a6;font-weight:600;opacity:0;animation:fadeUp .7s var(--ease) .9s forwards;z-index:2;letter-spacing:.02em}
.splash-bar{width:160px;height:4px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden;z-index:2;opacity:0;animation:fadeUp .5s .6s forwards}
.splash-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--gold));animation:load 1.6s var(--ease) .5s forwards}
@keyframes splashIn{0%{transform:scale(.6) translateY(10px);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes load{to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------- shell ---------- */
.app{display:flex;min-height:100vh;max-width:1460px;margin:0 auto;position:relative}
.sidebar{width:var(--nav-w);flex-shrink:0;position:sticky;top:0;height:100vh;padding:22px 16px;display:flex;
  flex-direction:column;gap:5px;background:var(--bg-2);border-right:1px solid var(--border);z-index:40}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 16px}
.nav-item{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:14px;color:var(--text-2);
  font-weight:600;font-size:.96rem;position:relative;transition:all .25s var(--ease);white-space:nowrap}
.nav-item .ic{width:22px;text-align:center;font-size:1.18rem}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--ink);color:#fff;box-shadow:var(--shadow)}
.nav-item.active::before{content:"";position:absolute;left:-16px;top:18%;height:64%;width:4px;border-radius:0 4px 4px 0;background:var(--flag)}
:root[data-theme="dark"] .nav-item.active{background:var(--surface-2)}
.nav-spacer{flex:1}
.nav-bottom{display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--border);padding-top:14px}
.cta-tg{display:flex;align-items:center;gap:10px;padding:12px 13px;border-radius:14px;background:linear-gradient(135deg,#229ED9,#2AABEE);color:#fff;font-weight:700;font-size:.88rem;box-shadow:var(--shadow);transition:transform .2s var(--ease)}
.cta-tg:hover{transform:translateY(-2px)}
.toggle-row{display:flex;gap:8px}
.seg{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;gap:2px;flex:1}
.seg button{flex:1;padding:7px 6px;border-radius:9px;font-size:.8rem;font-weight:700;color:var(--text-3);transition:all .2s}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
:root[data-theme="dark"] .seg button.on{background:var(--ink-2)}
.icon-btn{width:42px;display:grid;place-items:center;border-radius:12px;background:var(--surface-2);font-size:1.1rem;transition:all .2s}
.icon-btn:hover{background:var(--border)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.content{flex:1;padding:30px 40px 40px;max-width:var(--maxw);width:100%;margin:0 auto}
.view{animation:viewIn .5s var(--ease)}
@keyframes viewIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.page-head{margin-bottom:24px}
.page-head h1{font-size:2.1rem;font-weight:800}
.page-head p{color:var(--text-2);margin-top:4px}
.kicker{display:inline-flex;align-items:center;gap:7px;font-size:.72rem;font-weight:800;letter-spacing:.12em;
  text-transform:uppercase;color:var(--red);background:var(--rose-soft);padding:5px 12px;border-radius:99px;margin-bottom:12px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease),background .4s}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 19px;border-radius:13px;font-weight:700;font-size:.92rem;background:var(--ink);color:#fff;transition:all .22s var(--ease)}
.btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.btn:active{transform:translateY(0) scale(.98)}
.btn.red{background:var(--red)}.btn.gold{background:var(--gold);color:var(--ink)}.btn.ghost{background:var(--surface-2);color:var(--text)}
.btn.sm{padding:8px 13px;font-size:.82rem;border-radius:10px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:4px 9px;border-radius:8px;background:var(--surface-2);color:var(--text-2);white-space:nowrap}
.chip.core{background:var(--gold);color:var(--ink)}.chip.warn{background:var(--rose-soft);color:var(--rose)}
.chip.old{background:#9a3412;color:#fff}
.flagbar{height:6px;border-radius:6px;background:var(--flag);width:46px}

/* ---------- LANDING (hero + magazine) ---------- */
.hero{position:relative;overflow:hidden;border-radius:28px;padding:42px 44px;margin-bottom:20px;
  background:linear-gradient(125deg,var(--ink) 0%,#23131a 60%,#3a1015 100%);color:#fff;box-shadow:var(--shadow-lg)}
.hero::after{content:"";position:absolute;right:-80px;top:-90px;width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,var(--red),transparent 68%);opacity:.55;filter:blur(6px)}
.hero::before{content:"";position:absolute;left:-50px;bottom:-110px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,var(--gold),transparent 70%);opacity:.25}
.hero-inner{position:relative;z-index:2;display:flex;align-items:center;gap:30px;flex-wrap:wrap}
.hero-text{flex:1;min-width:280px}
.hero-text .big-h{font-family:'Space Grotesk';font-size:clamp(2.2rem,5vw,3.4rem);font-weight:700;line-height:1.02;letter-spacing:-.03em}
.hero-text .big-h .r{color:var(--red)}.hero-text .big-h .g{-webkit-text-stroke:0;color:var(--gold)}
.hero-rot{min-height:2.2rem;font-family:'Space Grotesk';font-size:1.25rem;color:var(--gold);font-weight:600;margin-top:14px}
.hero-rot .q{opacity:0;animation:rotIn .5s var(--ease) forwards}
@keyframes rotIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hero p.sub{color:#c9c7d2;max-width:480px;margin-top:10px}
.hero-cta{display:flex;gap:11px;margin-top:22px;flex-wrap:wrap}
.hero-stats{display:flex;gap:26px;margin-top:24px;flex-wrap:wrap}
.hero-stats .hs .n{font-family:'Space Grotesk';font-size:1.7rem;font-weight:700}
.hero-stats .hs .l{font-size:.74rem;color:#a9a7b3;text-transform:uppercase;letter-spacing:.08em}
/* ---- STREET HERO ---- */
.shero{position:relative;overflow:hidden;border-radius:26px;margin-bottom:18px;color:#fff;background:#0a0a0d;border:1px solid var(--border);box-shadow:var(--shadow-lg)}
.shero::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 420px at 10% -15%,rgba(225,0,26,.30),transparent 60%),radial-gradient(700px 400px at 105% 120%,rgba(255,203,5,.16),transparent 60%)}
.shero::after{content:"";position:absolute;inset:0;opacity:.05;background-image:linear-gradient(0deg,#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);background-size:34px 34px}
.shero-flag{position:absolute;left:0;top:0;bottom:0;width:9px;background:var(--flag);z-index:4}
.shero-in{position:relative;z-index:3;display:grid;grid-template-columns:1.45fr .9fr;gap:26px;padding:38px 40px 34px;align-items:center}
.st-logo{height:clamp(38px,5.5vw,60px);width:auto;margin-bottom:18px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.55))}
.st-head{font-family:'Space Grotesk';font-weight:700;font-size:clamp(2rem,5vw,3.4rem);line-height:.98;letter-spacing:-.03em;text-transform:uppercase}
.st-head .mark{background:var(--red);color:#fff;padding:.02em .14em;border-radius:5px;display:inline-block;transform:rotate(-1.8deg);box-shadow:0 6px 18px rgba(225,0,26,.4)}
.st-sub{color:#c9c7d2;max-width:440px;margin-top:14px;font-size:1.02rem}
.greet-bubble{display:inline-flex;align-items:center;gap:9px;margin-top:16px;background:#15151c;border:1px solid #2a2a34;border-radius:14px;padding:9px 14px;font-family:'Space Grotesk';font-weight:600;color:var(--gold);min-height:40px}
.greet-bubble .dot{width:9px;height:9px;border-radius:50%;background:var(--green);animation:liveDot 1.6s infinite}
@keyframes liveDot{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 8px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
.shero-cta{display:flex;gap:11px;margin-top:20px;flex-wrap:wrap}
.shero-stats{display:flex;gap:24px;margin-top:22px;flex-wrap:wrap}
.shero-stats .n{font-family:'Space Grotesk';font-weight:700;font-size:1.5rem}
.shero-stats .l{font-size:.7rem;color:#9a98a6;text-transform:uppercase;letter-spacing:.08em}
.sticker{position:absolute;font-family:'Space Grotesk';font-weight:700;font-size:.8rem;padding:5px 11px;border-radius:9px;z-index:2;box-shadow:0 8px 18px rgba(0,0,0,.45)}
.chatmock{background:#0d1419;border:1px solid #1d262e;border-radius:20px;padding:14px;display:flex;flex-direction:column;gap:9px;min-height:240px;justify-content:flex-end;position:relative;overflow:hidden}
.chatmock::before{content:"● ● ●";position:absolute;top:8px;left:14px;color:#2a3540;font-size:.6rem;letter-spacing:3px}
.cm-bubble{max-width:86%;padding:9px 13px;border-radius:15px;font-size:.88rem;line-height:1.35;opacity:0;transform:translateY(10px);animation:cmIn .45s var(--ease) forwards}
.cm-l{background:#202c33;color:#e9edef;align-self:flex-start;border-bottom-left-radius:5px}
.cm-r{background:#005c4b;color:#e9edef;align-self:flex-end;border-bottom-right-radius:5px}
@keyframes cmIn{to{opacity:1;transform:none}}
.slang-ticker{position:relative;z-index:3;overflow:hidden;border-top:1px solid #1c1c24;background:#08080b}
.slang-ticker .track{display:inline-flex;gap:0;white-space:nowrap;padding:11px 0;animation:tick 30s linear infinite;font-family:'Space Grotesk';font-weight:700;color:#56565f;font-size:.92rem}
.slang-ticker .track span{padding:0 18px}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media(max-width:820px){.shero-in{grid-template-columns:1fr}.chatmock{display:none}.sticker{display:none}}

.mascot{width:130px;height:130px;flex-shrink:0;filter:drop-shadow(0 12px 22px rgba(0,0,0,.4))}
.mascot.bounce{animation:bounce .6s var(--ease-2)}.mascot.shake{animation:shakeM .5s}.mascot.jump{animation:jump .7s var(--ease-2)}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px) scale(1.04)}60%{transform:translateY(2px)}}
@keyframes shakeM{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}80%{transform:rotate(4deg)}}
@keyframes jump{0%{transform:translateY(0)}30%{transform:translateY(-30px) rotate(-6deg)}55%{transform:translateY(0) rotate(3deg)}70%{transform:translateY(-10px)}100%{transform:translateY(0)}}

.mag-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:18px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.stat{padding:17px 18px;border-radius:16px}
.stat .v{font-family:'Space Grotesk';font-size:1.7rem;font-weight:700;line-height:1}
.stat .l{font-size:.78rem;color:var(--text-2);margin-top:5px;font-weight:600}
.stat .ic{font-size:1.1rem;margin-bottom:8px;display:block}
.wotd{padding:26px;position:relative;overflow:hidden}
.wotd .label{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3)}
.wotd .word{font-family:'Space Grotesk';font-size:2.1rem;font-weight:700;margin:8px 0 2px;color:var(--red)}
.tr-line{display:flex;align-items:center;gap:9px;margin:3px 0}.tr-line .fl{width:22px;text-align:center}
.streak-big{font-family:'Space Grotesk';font-size:3.2rem;font-weight:700;line-height:1}
.flame{display:inline-block;animation:flick 1.4s ease-in-out infinite alternate;transform-origin:bottom}
@keyframes flick{0%{transform:scale(1) rotate(-2deg)}100%{transform:scale(1.12) rotate(3deg)}}
.feat-row{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 8px}
.feat-pill{flex-shrink:0;padding:9px 14px;border-radius:99px;background:var(--surface);border:1px solid var(--border);font-weight:700;font-family:'Space Grotesk';cursor:pointer;transition:all .2s}
.feat-pill:hover{border-color:var(--red);transform:translateY(-2px)}
.pillar-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.pillar{padding:22px;border-radius:18px;cursor:pointer;position:relative;overflow:hidden;color:#fff;transition:transform .3s var(--ease),box-shadow .3s}
.pillar:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.pillar .e{font-size:2rem}.pillar h3{margin:8px 0 2px}.pillar .c{font-size:.8rem;opacity:.85}

/* ---------- LEARN cards (enriched) ---------- */
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:10px 18px;border-radius:13px;font-weight:700;font-size:.92rem;background:var(--surface);border:1px solid var(--border);color:var(--text-2);transition:all .25s var(--ease)}
.tab.on{background:var(--red);color:#fff;border-color:var(--red)}.tab .c{font-size:.74rem;opacity:.7;margin-left:5px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:10px 14px}
.search input{flex:1;border:none;background:none;outline:none;color:var(--text);font-size:.95rem}
.select{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:9px 12px;color:var(--text);font-weight:600;font-size:.85rem;outline:none}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.xcard{padding:0;overflow:hidden;display:flex;flex-direction:column;opacity:0;animation:cardIn .5s var(--ease) forwards;position:relative}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.xcard .xhead{padding:17px 18px 12px;position:relative}
.xcard .xwm{position:absolute;right:10px;bottom:6px;font-size:.6rem;font-weight:800;letter-spacing:.1em;color:var(--text-3);opacity:.4}
.xcard .de{font-family:'Space Grotesk';font-size:1.4rem;font-weight:700;line-height:1.15}
.xcard .phon{font-family:'JetBrains Mono';font-size:.8rem;color:var(--text-3);margin-top:2px}
.xcard .tr{font-size:.93rem;color:var(--text-2);margin-top:2px}.xcard .tr b{color:var(--text)}
.xcard .ex{font-size:.87rem;color:var(--text-2);background:var(--surface-2);border-radius:10px;padding:9px 11px;border-left:3px solid var(--gold);margin-top:4px}
.xcard .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.xcard .acts{display:flex;gap:6px;padding:12px 18px;border-top:1px solid var(--border);background:var(--bg-2)}
.iconbtn{width:36px;height:36px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;font-size:1rem;transition:all .2s var(--ease);flex-shrink:0}
.iconbtn:hover{background:var(--red);color:#fff;transform:translateY(-2px)}
.formality{display:flex;gap:3px;align-items:center}.formality .dot{width:7px;height:7px;border-radius:50%;background:var(--border-2)}.formality .dot.on{background:var(--red)}
.detail{max-height:0;overflow:hidden;transition:max-height .45s var(--ease);background:var(--bg-2);border-top:1px solid transparent}
.detail.open{max-height:1400px;border-top-color:var(--border)}
.detail-in{padding:16px 18px;display:flex;flex-direction:column;gap:13px}
.dsec h5{font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dsec .exmore{font-size:.88rem;color:var(--text);padding:7px 10px;background:var(--surface-2);border-radius:9px;margin-bottom:6px}
.dsec .exmore .g{color:var(--text-3);font-size:.8rem}
.synrow{display:flex;flex-wrap:wrap;gap:6px}

.reveal-right{opacity:0;transform:translateX(40px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.reveal-right.visible{opacity:1;transform:none}
.reveal-scale{opacity:0;transform:scale(.88);transition:opacity .5s var(--ease),transform .5s var(--ease-2)}
.reveal-scale.visible{opacity:1;transform:scale(1)}

/* ---------- ENHANCED CARD SYSTEM ---------- */
.card{transition:transform .35s var(--ease),box-shadow .35s var(--ease),background .4s,border-color .3s}
.card:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(225,0,26,.08),0 8px 24px rgba(20,20,30,.1);border-color:rgba(225,0,26,.15)}
:root[data-theme="dark"] .card:hover{box-shadow:0 20px 50px rgba(225,0,26,.12),0 8px 24px rgba(0,0,0,.4);border-color:rgba(225,0,26,.25)}

/* ---------- GLASSMORPHISM LAYER ---------- */
.glass{background:rgba(255,255,255,.55);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border:1px solid rgba(255,255,255,.35)}
:root[data-theme="dark"] .glass{background:rgba(18,18,23,.6);border:1px solid rgba(255,255,255,.08)}

.sidebar{backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4)}
:root[data-theme="dark"] .sidebar{background:rgba(8,8,11,.85)}

.mobile-nav{backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);background:rgba(246,245,241,.8)!important}
:root[data-theme="dark"] .mobile-nav{background:rgba(8,8,11,.85)!important}
.mobile-top{backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);background:rgba(255,255,255,.75)!important}
:root[data-theme="dark"] .mobile-top{background:rgba(8,8,11,.82)!important}

/* ---------- RIPPLE EFFECT ---------- */
.btn,.nav-item,.tab,.opt,.mode,.pillar,.dia-card,.iconbtn,.feat-pill,.wchip,.drag-item{position:relative;overflow:hidden}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);animation:rippleOut .6s ease-out forwards;pointer-events:none;z-index:1}
:root[data-theme="dark"] .ripple{background:rgba(255,255,255,.15)}
.btn.ghost .ripple,.nav-item .ripple,.tab .ripple,.opt .ripple{background:rgba(225,0,26,.12)}
@keyframes rippleOut{to{transform:scale(4);opacity:0}}

/* ---------- SHIMMER ON PROGRESS BARS ---------- */
.progress i,.xp-bar i{position:relative;overflow:hidden}
.progress i::after,.xp-bar i::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmer 2.2s ease-in-out infinite}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

/* ---------- NAV ENHANCEMENTS ---------- */
.nav-item{transition:all .25s var(--ease),background .25s,transform .2s}
.nav-item:hover{transform:translateX(4px)}
.nav-item.active{transform:translateX(2px)}
.nav-item.active::after{content:"";position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(225,0,26,.08),rgba(255,203,5,.06));pointer-events:none}

/* ---------- ANIMATED GRADIENT ACCENT ---------- */
.hero,.shero,.lesson-hero{background-size:200% 200%;animation:gradientShift 12s ease infinite}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ---------- FLOATING PARTICLES ---------- */
.particle-field{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1}
.particle{position:absolute;border-radius:50%;opacity:0;animation:particleFloat linear infinite;will-change:transform,opacity;contain:strict}
@keyframes particleFloat{
  0%{opacity:0;transform:translateY(100%) scale(0)}
  10%{opacity:.6}
  90%{opacity:.3}
  100%{opacity:0;transform:translateY(-120vh) scale(1) rotate(180deg)}
}

/* ---------- BUTTON ENHANCEMENTS ---------- */
.btn{transition:all .25s var(--ease),box-shadow .25s;position:relative}
.btn::before{content:"";position:absolute;inset:-2px;border-radius:15px;background:linear-gradient(135deg,var(--red),var(--gold));opacity:0;z-index:-1;transition:opacity .3s;filter:blur(8px)}
.btn:hover::before{opacity:.35}
.btn:active{transform:translateY(0) scale(.96)!important;transition-duration:.1s}
.btn.red:hover{box-shadow:0 8px 28px rgba(225,0,26,.35)}
.btn.gold:hover{box-shadow:0 8px 28px rgba(255,203,5,.35)}

.cta-tg{transition:all .3s var(--ease)}
.cta-tg:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(34,158,217,.3)}

/* ---------- ENHANCED SPLASH ---------- */
#splash{background:radial-gradient(ellipse at 30% 20%,rgba(225,0,26,.18),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,203,5,.1),transparent 50%),var(--ink)}
#splash::after{content:"";position:absolute;inset:0;background-image:radial-gradient(1.5px 1.5px at 15% 25%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 65% 15%,rgba(255,255,255,.25),transparent),radial-gradient(1.2px 1.2px at 40% 65%,rgba(255,255,255,.2),transparent),radial-gradient(1px 1px at 80% 50%,rgba(255,255,255,.15),transparent),radial-gradient(1.5px 1.5px at 25% 80%,rgba(255,255,255,.2),transparent);animation:twinkle 3s ease-in-out infinite alternate}
.splash-bar{border-radius:99px;position:relative}
.splash-bar::after{content:"";position:absolute;inset:0;border-radius:99px;background:inherit;filter:blur(6px);opacity:.5}

/* ---------- ENHANCED TOOLTIPS ---------- */
.tooltip{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);transition:opacity .25s var(--ease-2),transform .25s var(--ease-2)}
.tooltip.show{transform:translateY(-4px)}

/* ---------- TOAST ENHANCEMENT ---------- */
.toast{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);background:rgba(22,22,29,.88)}
.toast.show{animation:toastBounce .5s var(--ease-2)}
@keyframes toastBounce{0%{transform:translateX(-50%) translateY(30px) scale(.9)}60%{transform:translateX(-50%) translateY(-6px) scale(1.02)}100%{transform:translateX(-50%) translateY(0) scale(1)}}

/* ---------- MODAL ENHANCEMENT ---------- */
.modal-bg{background:rgba(8,8,12,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.modal{border:1px solid var(--border);transition:transform .45s var(--ease-2),opacity .35s}
.modal-bg.show .modal{animation:modalSpring .5s var(--ease-2)}
@keyframes modalSpring{0%{transform:scale(.85) translateY(20px);opacity:0}60%{transform:scale(1.02) translateY(-4px)}100%{transform:scale(1) translateY(0);opacity:1}}

/* ---------- XP POPUP ENHANCEMENT ---------- */
.xp-pop{filter:drop-shadow(0 0 12px rgba(255,203,5,.5));animation:flyUp 1.2s var(--ease) forwards!important}
@keyframes flyUp{0%{opacity:0;transform:translateY(0) scale(.4) rotate(-8deg)}15%{opacity:1;transform:translateY(-20px) scale(1.2) rotate(4deg)}35%{transform:translateY(-30px) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-90px) scale(.8)}}

/* ---------- FLASHCARD 3D ENHANCEMENT ---------- */
.flash{perspective:1800px}
.flash-inner{transition:transform .8s var(--ease-2)}
.face{box-shadow:0 20px 50px rgba(0,0,0,.12),0 1px 3px rgba(0,0,0,.06)}
.face.front{background:linear-gradient(155deg,var(--surface) 0%,var(--surface-2) 50%,rgba(225,0,26,.03) 100%)}
.face.back{background:linear-gradient(155deg,var(--ink) 0%,var(--ink-2) 50%,rgba(225,0,26,.12) 100%)}
.flash:hover .flash-inner{transform:rotateY(5deg)}
.flash.flip:hover .flash-inner{transform:rotateY(175deg)}

/* ---------- ACHIEVEMENT CELEBRATIONS ---------- */
.achv{transition:all .35s var(--ease)}
.achv.un{animation:achvUnlock .6s var(--ease-2)}
.achv:hover{transform:translateY(-4px)}
.achv.un:hover{box-shadow:0 12px 30px rgba(255,203,5,.2)}
@keyframes achvUnlock{0%{transform:scale(.7) rotate(-5deg);opacity:0}60%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}

/* ---------- STAT CARDS ---------- */
.stat{transition:all .3s var(--ease);position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(225,0,26,.06),transparent 60%);pointer-events:none;transition:opacity .3s}
.stat:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.stat:hover::after{opacity:1}

/* ---------- PILLAR CARDS ENHANCEMENT ---------- */
.pillar{transition:all .35s var(--ease)}
.pillar::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.4));pointer-events:none;transition:opacity .3s}
.pillar:hover::after{opacity:.6}
.pillar:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 24px 50px rgba(0,0,0,.3)}

/* ---------- CHAT BUBBLES ---------- */
.bubble{transition:all .2s var(--ease)}
.bubble:hover{transform:scale(1.02)}
.bubble-row{animation-duration:.5s}
.bubble-row:nth-child(2){animation-delay:.1s}
.bubble-row:nth-child(3){animation-delay:.2s}
.bubble-row:nth-child(4){animation-delay:.3s}
.bubble-row:nth-child(5){animation-delay:.4s}
.bubble-row:nth-child(6){animation-delay:.5s}

/* ---------- DRAG & MATCH ITEMS ---------- */
.drag-item{transition:all .25s var(--ease)}
.drag-item:hover:not(.matched){transform:translateX(4px);border-color:var(--red);box-shadow:0 4px 16px rgba(225,0,26,.1)}
.drag-item.matched{animation:matchPop .4s var(--ease-2)}
@keyframes matchPop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}

/* ---------- QUIZ OPTIONS ---------- */
.opt{transition:all .25s var(--ease)}
.opt:hover{border-color:var(--red);background:rgba(225,0,26,.03);transform:translateX(6px);box-shadow:0 4px 16px rgba(225,0,26,.08)}
:root[data-theme="dark"] .opt:hover{background:rgba(225,0,26,.08)}

/* ---------- SEARCH INPUT GLOW ---------- */
.search{transition:all .3s var(--ease)}
.search:focus-within{border-color:var(--red);box-shadow:0 0 0 3px rgba(225,0,26,.1);transform:translateY(-1px)}

/* ---------- TABS ---------- */
.tab{transition:all .3s var(--ease)}
.tab:hover{transform:translateY(-2px);border-color:var(--red);color:var(--text)}
.tab.on{box-shadow:0 6px 20px rgba(225,0,26,.2)}

/* ---------- STICKER FLOAT ---------- */
.sticker{animation:stickerFloat 4s ease-in-out infinite alternate}
@keyframes stickerFloat{0%{transform:translateY(0) rotate(-2deg)}100%{transform:translateY(-8px) rotate(2deg)}}

/* ---------- DONATION CARDS ---------- */
.coin-card{transition:all .4s var(--ease)}
.coin-card:hover{transform:translateY(-8px) scale(1.01);box-shadow:0 30px 60px rgba(0,0,0,.5)}

/* ---------- WORD CHIPS ---------- */
.wchip{transition:all .25s var(--ease-2)}
.wchip:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 6px 18px rgba(225,0,26,.12)}

/* ---------- FEATURED PILLS ---------- */
.feat-pill{transition:all .3s var(--ease)}
.feat-pill:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 6px 18px rgba(225,0,26,.1);background:rgba(225,0,26,.04)}

/* ---------- ICON BUTTONS ---------- */
.iconbtn{transition:all .25s var(--ease-2)}
.iconbtn:hover{transform:translateY(-3px) scale(1.08)}

/* ---------- HEATMAP CELLS ---------- */
.heat .d{transition:all .2s var(--ease)}
.heat .d:hover{transform:scale(1.6);z-index:2;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.2)}

/* ---------- NAV BRAND LOGO HOVER ---------- */
.brand{transition:all .3s var(--ease)}
.brand:hover{transform:scale(1.03)}

/* ---------- FLAGBAR SHIMMER ---------- */
.flagbar{position:relative;overflow:hidden}
.flagbar::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 3s ease-in-out infinite}

/* ---------- SEGMENT CONTROLS ---------- */
.seg button{transition:all .25s var(--ease)}
.seg button:hover:not(.on){background:rgba(225,0,26,.06)}
.seg button.on{transition:all .3s var(--ease-2)}

/* ---------- SMOOTH VIEW TRANSITION ---------- */
@keyframes viewIn{from{opacity:0;transform:translateY(18px) scale(.995)}to{opacity:1;transform:none}}

/* ---------- FOCUS STYLES FOR ACCESSIBILITY ---------- */
.btn:focus-visible,.nav-item:focus-visible,.tab:focus-visible,.opt:focus-visible,.iconbtn:focus-visible,.seg button:focus-visible{outline:2px solid var(--red);outline-offset:3px;border-radius:inherit}

/* ---------- SELECTION ---------- */
::selection{background:var(--gold);color:var(--ink);border-radius:4px}

/* ---------- SMOOTH SCROLL SNAP ON MOBILE ---------- */
@media(max-width:760px){
  .feat-row{scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .feat-pill{scroll-snap-align:start}
  .pillar-cards .pillar{animation:cardIn .5s var(--ease) forwards;opacity:0}
  .pillar-cards .pillar:nth-child(1){animation-delay:.1s}
  .pillar-cards .pillar:nth-child(2){animation-delay:.2s}
  .pillar-cards .pillar:nth-child(3){animation-delay:.3s}
}

/* ============================================================
   DEUTSCHMATES — MOTION GRAPHICS LAYER
   Berlin skyline · Speech bubbles · Flag wave · Cultural icons
   ============================================================ */

/* ---------- BERLIN SKYLINE ---------- */
.skyline-wrap{position:absolute;bottom:0;left:0;right:0;height:120px;z-index:1;pointer-events:none;overflow:hidden;opacity:.18}
:root[data-theme="dark"] .skyline-wrap{opacity:.12}
.skyline-wrap svg{position:absolute;bottom:0;width:100%;height:100%}

/* ---------- FLOATING SPEECH BUBBLES ---------- */
.speech-floats{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1}
.speech-float{position:absolute;background:rgba(255,255,255,.08);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);border-radius:16px 16px 16px 4px;padding:8px 14px;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.55);white-space:nowrap;opacity:0;animation:speechFloat linear infinite}
.speech-float:nth-child(even){border-radius:16px 16px 4px 16px}
.speech-float .sf-de{color:var(--gold);font-weight:700}
@keyframes speechFloat{
  0%{opacity:0;transform:translateY(30px) scale(.85) rotate(-3deg)}
  8%{opacity:.7;transform:translateY(10px) scale(1) rotate(0deg)}
  85%{opacity:.5;transform:translateY(-180px) scale(.95) rotate(2deg)}
  100%{opacity:0;transform:translateY(-220px) scale(.88) rotate(-1deg)}
}

/* ---------- FLAG WAVE RIBBON ---------- */
.flag-ribbon{position:relative;height:8px;overflow:hidden;z-index:2}
.flag-ribbon svg{width:200%;height:100%;animation:flagWave 4s ease-in-out infinite}
@keyframes flagWave{0%{transform:translateX(0)}50%{transform:translateX(-25%)}100%{transform:translateX(0)}}

/* ---------- FLOATING CULTURAL ICONS ---------- */
.culture-floats{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.culture-icon{position:absolute;font-size:1.6rem;opacity:0;animation:cultureFloat linear infinite;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
@keyframes cultureFloat{
  0%{opacity:0;transform:translateY(60px) rotate(-15deg) scale(.6)}
  12%{opacity:.35}
  50%{opacity:.25;transform:translateY(-80px) rotate(10deg) scale(1)}
  88%{opacity:.15}
  100%{opacity:0;transform:translateY(-200px) rotate(25deg) scale(.7)}
}

.orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;mix-blend-mode:screen}
.orb-red{background:rgba(225,0,26,.22);animation:orbPulse 8s ease-in-out infinite}
.orb-gold{background:rgba(255,203,5,.15);animation:orbPulse 10s ease-in-out infinite 2s}
.orb-blue{background:rgba(37,99,235,.12);animation:orbPulse 12s ease-in-out infinite 4s}
@keyframes orbPulse{
  0%,100%{transform:scale(1) translate(0,0);opacity:.6}
  33%{transform:scale(1.3) translate(15px,-20px);opacity:.9}
  66%{transform:scale(.9) translate(-10px,15px);opacity:.5}
}
:root[data-theme="dark"] .orb{mix-blend-mode:normal}

/* ---------- SPLASH ENHANCED ANIMATION ---------- */
.splash-skyline{position:absolute;bottom:0;left:0;right:0;height:80px;z-index:1;opacity:.15}
.splash-skyline svg{width:100%;height:100%}
.splash-ring{position:absolute;width:280px;height:280px;border:2px solid rgba(225,0,26,.15);border-radius:50%;z-index:1;animation:ringExpand 2.5s var(--ease) .3s forwards;opacity:0}
.splash-ring:nth-child(2){width:380px;height:380px;border-color:rgba(255,203,5,.1);animation-delay:.6s}
@keyframes ringExpand{0%{transform:scale(.3);opacity:0}40%{opacity:.6}100%{transform:scale(1);opacity:0}}

/* ---------- WAVEFORM VISUALIZER ---------- */
.waveform{display:inline-flex;align-items:center;gap:2px;height:20px;vertical-align:middle}
.waveform .bar{width:3px;border-radius:2px;background:var(--red);animation:waveBar .8s ease-in-out infinite alternate}
.waveform .bar:nth-child(1){height:30%;animation-delay:0s}
.waveform .bar:nth-child(2){height:60%;animation-delay:.1s}
.waveform .bar:nth-child(3){height:90%;animation-delay:.2s}
.waveform .bar:nth-child(4){height:50%;animation-delay:.3s}
.waveform .bar:nth-child(5){height:70%;animation-delay:.15s}
.waveform .bar:nth-child(6){height:40%;animation-delay:.25s}
.waveform .bar:nth-child(7){height:80%;animation-delay:.05s}
@keyframes waveBar{0%{height:20%}100%{height:100%}}

/* ---------- TYPING INDICATOR ---------- */
.typing-dots{display:inline-flex;gap:4px;padding:4px 8px;border-radius:12px;background:rgba(255,255,255,.08);vertical-align:middle}
.typing-dots .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:typingBounce 1.4s ease-in-out infinite}
.typing-dots .dot:nth-child(2){animation-delay:.2s}
.typing-dots .dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ---------- ANIMATED MAP PIN ---------- */
.map-pin{display:inline-block;animation:pinBounce 2s ease-in-out infinite}
@keyframes pinBounce{0%,100%{transform:translateY(0)}15%{transform:translateY(-8px)}30%{transform:translateY(0)}45%{transform:translateY(-4px)}60%{transform:translateY(0)}}

/* ---------- ROTATING BADGE ---------- */
.badge-shine{position:relative;overflow:hidden}
.badge-shine::after{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.25) 50%,transparent 60%);animation:badgeShine 3s ease-in-out infinite}
@keyframes badgeShine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}

/* ---------- SECTION GLOW DIVIDER ---------- */
.glow-divider{height:2px;border:none;background:linear-gradient(90deg,transparent,var(--red),var(--gold),var(--red),transparent);margin:24px 0;opacity:.4;animation:glowPulse 3s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.25;filter:blur(0)}50%{opacity:.6;filter:blur(1px)}}

/* ---------- REDUCED MOTION ---------- */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
  .scroll-progress,.particle-field,.speech-floats,.culture-floats,.orb,.flag-ribbon,.splash-ring{display:none}
}
</style>

{id:201,de:"die Daumen drücken",lit:"to press the thumbs",ph:"DAU-men drük-ken",en:"to keep one's fingers crossed",fa:"برای کسی آرزوی موفقیت کردن (معادل: انگشت‌ها را قلاب کردن)",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Ich drück dir die Daumen für die Prüfung!",xen:"I'll keep my fingers crossed for your exam!",y:"Redewendung"},
{id:202,de:"Schwein haben",lit:"to have pig",ph:"schwain HA-ben",en:"to get lucky / have a stroke of luck",fa:"شانس آوردن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Da hast du nochmal Schwein gehabt!",xen:"You got lucky there!",y:"Redewendung"},
{id:203,de:"die Nase voll haben",lit:"to have the nose full",ph:"NA-se foll",en:"to be fed up with something",fa:"خسته و بیزار شدن، کارد به استخوان رسیدن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Ich hab die Nase voll von diesem Job.",xen:"I'm fed up with this job.",y:"Redewendung"},
{id:204,de:"Tomaten auf den Augen haben",lit:"to have tomatoes on the eyes",ph:"to-MA-ten",en:"to fail to see the obvious",fa:"چیز واضح را ندیدن، جلوِ چشم را نگرفتن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Der Schlüssel lag da! Hast du Tomaten auf den Augen?",xen:"The key was right there! Are you blind?",y:"Redewendung"},
{id:205,de:"ins Gras beißen",lit:"to bite into the grass",ph:"gras BAI-sen",en:"to kick the bucket / die",fa:"غزل خداحافظی را خواندن، مردن",t:"idiom",f:1,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"Salopp",od:0,mo:"",core:0,xde:"In dem Film beißen am Ende fast alle ins Gras.",xen:"In the film almost everyone bites the dust.",y:"Redewendung"},
{id:206,de:"den Nagel auf den Kopf treffen",lit:"to hit the nail on the head",ph:"NA-gel … kopf",en:"to hit the nail on the head / be exactly right",fa:"دقیقاً به هدف زدن، درست به مطلب رسیدن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Mit dieser Analyse hast du den Nagel auf den Kopf getroffen.",xen:"With that analysis you hit the nail on the head.",y:"Redewendung"},

{id:213,de:"das Handtuch werfen",lit:"to throw the towel",ph:"HAND-tuch",en:"to throw in the towel / quit",fa:"حوله انداختن، کنار کشیدن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Nach dem dritten Versuch hat er das Handtuch geworfen.",xen:"After the third try he threw in the towel.",y:"Redewendung"},
{id:214,de:"jdm. auf den Keks gehen",lit:"to go on sb's biscuit",ph:"keks",en:"to get on sb's nerves",fa:"روی اعصاب کسی رفتن، کلافه کردن",t:"idiom",f:1,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Dein ständiges Gerede geht mir auf den Keks.",xen:"Your constant talking gets on my nerves.",y:"Redewendung"},
{id:215,de:"nur Bahnhof verstehen",lit:"to understand only train station",ph:"BAHN-hof",en:"to understand nothing at all",fa:"هیچ‌چیز نفهمیدن (معادل: فقط ایستگاه قطار را فهمیدن)",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Bei dem Vortrag hab ich nur Bahnhof verstanden.",xen:"In that lecture I understood nothing at all.",y:"Redewendung"},
{id:216,de:"die Kuh vom Eis holen",lit:"to get the cow off the ice",ph:"kuh fom ais",en:"to resolve a tricky situation",fa:"از یک موقعیت بغرنج بیرون آمدن، گره را باز کردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Mit dem Kompromiss haben wir die Kuh vom Eis geholt.",xen:"With the compromise we sorted the tricky situation.",y:"Redewendung"},
{id:217,de:"jdm. reinen Wein einschenken",lit:"to pour sb pure wine",ph:"RAI-nen vain",en:"to tell sb the honest truth",fa:"رک و راست حقیقت را به کسی گفتن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Ich schenke dir reinen Wein ein: Es läuft schlecht.",xen:"I'll be straight with you: things are going badly.",y:"Redewendung"},
{id:218,de:"den Stier bei den Hörnern packen",lit:"to grab the bull by the horns",ph:"schtier … HÖR-nern",en:"to take the bull by the horns",fa:"شاخِ گاو را گرفتن، با مشکل رو‌در‌رو شدن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Pack den Stier bei den Hörnern und ruf sie an!",xen:"Take the bull by the horns and call her!",y:"Redewendung"},
{id:219,de:"ein Auge zudrücken",lit:"to press one eye shut",ph:"AU-ge tsu-drük-ken",en:"to turn a blind eye",fa:"چشم‌پوشی کردن، نادیده گرفتن",t:"idiom",f:3,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Der Lehrer hat bei dem Fehler ein Auge zugedrückt.",xen:"The teacher turned a blind eye to the mistake.",y:"Redewendung"},
{id:220,de:"die Hand für jdn. ins Feuer legen",lit:"to put one's hand in the fire for sb",ph:"hand ins FOI-er",en:"to vouch for sb completely",fa:"دست در آتش گذاشتن برای کسی، کاملاً ضمانت کردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Für meinen Bruder leg ich die Hand ins Feuer.",xen:"I'd vouch for my brother completely.",y:"Redewendung"},
{id:221,de:"jdn. auf die Palme bringen",lit:"to bring sb up the palm tree",ph:"PAL-me",en:"to drive sb up the wall / infuriate",fa:"کسی را از کوره در بردن، عصبانی کردن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Mit seiner Unpünktlichkeit bringt er mich auf die Palme.",xen:"His lateness drives me up the wall.",y:"Redewendung"},
{id:222,de:"aus einer Mücke einen Elefanten machen",lit:"to make an elephant out of a mosquito",ph:"MÜK-ke … e-le-FANT",en:"to make a mountain out of a molehill",fa:"از کاه کوه ساختن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Mach aus einer Mücke keinen Elefanten.",xen:"Don't make a mountain out of a molehill.",y:"Redewendung"},
{id:223,de:"die Beine in die Hand nehmen",lit:"to take the legs into the hand",ph:"BAI-ne … hand",en:"to leg it / run very fast",fa:"پا گذاشتن به فرار، دوپا داشتن دوتا قرض گرفتن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Nimm die Beine in die Hand, der Bus kommt!",xen:"Leg it, the bus is coming!",y:"Redewendung"},
{id:224,de:"jdm. ein Licht aufgehen",lit:"a light goes on for sb",ph:"licht AUF-ge-en",en:"for the penny to drop / suddenly understand",fa:"دوزاری افتادن، ناگهان فهمیدن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Plötzlich ging mir ein Licht auf.",xen:"Suddenly the penny dropped.",y:"Redewendung"},
{id:225,de:"den Faden verlieren",lit:"to lose the thread",ph:"FA-den",en:"to lose one's train of thought",fa:"رشته‌ی کلام را گم کردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Entschuldige, ich hab den Faden verloren.",xen:"Sorry, I lost my train of thought.",y:"Redewendung"},
{id:226,de:"jdm. das Wasser reichen können",lit:"to be able to hand sb the water",ph:"VAS-ser RAI-chen",en:"to hold a candle to sb",fa:"به گردِ کسی رسیدن، هم‌سنگِ کسی بودن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"In Mathe kann ihr keiner das Wasser reichen.",xen:"No one can hold a candle to her in maths.",y:"Redewendung"},
{id:227,de:"mit dem Kopf durch die Wand wollen",lit:"to want through the wall with the head",ph:"kopf durch di vand",en:"to be pig-headed / force things",fa:"یک‌دندگی کردن، با سر به دیوار زدن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Du kannst nicht immer mit dem Kopf durch die Wand.",xen:"You can't always force things through.",y:"Redewendung"},
{id:228,de:"das schwarze Schaf sein",lit:"to be the black sheep",ph:"SCHWAR-tse schaf",en:"to be the black sheep of the family",fa:"وصله‌ی ناجور بودن، گوسفند سیاهِ خانواده",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"In der Familie war er immer das schwarze Schaf.",xen:"In the family he was always the black sheep.",y:"Redewendung"},
{id:229,de:"jdm. Honig um den Mund schmieren",lit:"to smear honey around sb's mouth",ph:"HO-nig",en:"to butter sb up / sweet-talk",fa:"هندوانه زیر بغل کسی گذاشتن، چاپلوسی کردن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Er schmiert dem Chef ständig Honig um den Mund.",xen:"He's always buttering up the boss.",y:"Redewendung"},
{id:230,de:"die Ohren spitzen",lit:"to sharpen the ears",ph:"OH-ren SPIT-sen",en:"to prick up one's ears / listen closely",fa:"گوش تیز کردن، با دقت گوش دادن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Als sein Name fiel, spitzte er die Ohren.",xen:"When his name came up, he pricked up his ears.",y:"Redewendung"},
{id:231,de:"jdn. über den Tisch ziehen",lit:"to pull sb over the table",ph:"tisch TSII-en",en:"to rip sb off / pull a fast one",fa:"سرِ کسی کلاه گذاشتن، تیغ زدن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Beim Autokauf hat er mich über den Tisch gezogen.",xen:"He ripped me off on the car deal.",y:"Redewendung"},
{id:232,de:"reinen Tisch machen",lit:"to make a clean table",ph:"RAI-nen tisch",en:"to clear the air / come clean",fa:"تکلیف را روشن کردن، صاف و پوست‌کنده گفتن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Lass uns reinen Tisch machen und alles klären.",xen:"Let's clear the air and sort it all out.",y:"Redewendung"},
{id:233,de:"in den sauren Apfel beißen",lit:"to bite into the sour apple",ph:"SAU-ren AP-fel",en:"to bite the bullet / do sth unpleasant",fa:"دندان روی جگر گذاشتن، به کارِ ناخوشایند تن دادن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Ich muss in den sauren Apfel beißen und es ihm sagen.",xen:"I have to bite the bullet and tell him.",y:"Redewendung"},
{id:234,de:"alles in Butter",lit:"everything in butter",ph:"AL-les in BUT-ter",en:"everything's fine / all good",fa:"همه‌چی روبه‌راه است، آب از آب تکان نمی‌خورد",t:"idiom",f:1,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Keine Sorge, bei uns ist alles in Butter.",xen:"No worries, everything's fine with us.",y:"Redewendung"},
{id:235,de:"jdm. auf den Wecker gehen",lit:"to go on sb's alarm clock",ph:"VEK-ker",en:"to get on sb's nerves",fa:"روی اعصاب کسی رفتن",t:"idiom",f:1,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Der geht mir mit seinen Fragen auf den Wecker.",xen:"He gets on my nerves with his questions.",y:"Redewendung"},
{id:236,de:"über seinen Schatten springen",lit:"to jump over one's own shadow",ph:"SCHAT-ten",en:"to overcome one's reservations",fa:"از خودگذشتگی کردن، بر تردید خود غلبه کردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Spring über deinen Schatten und entschuldige dich.",xen:"Get over yourself and apologise.",y:"Redewendung"},
{id:237,de:"sich wie ein Elefant im Porzellanladen benehmen",lit:"like an elephant in a china shop",ph:"por-tse-LAN-la-den",en:"like a bull in a china shop",fa:"مثل فیل در مغازه‌ی چینی‌فروشی، بسیار بی‌ملاحظه",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Er benimmt sich wie ein Elefant im Porzellanladen.",xen:"He behaves like a bull in a china shop.",y:"Redewendung"},
{id:238,de:"jdm. auf die Schliche kommen",lit:"to come onto sb's tricks",ph:"SCHLI-che",en:"to be onto sb / figure out their game",fa:"دستِ کسی را خواندن، به کلکش پی بردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Die Polizei kam dem Betrüger auf die Schliche.",xen:"The police were onto the fraudster.",y:"Redewendung"},
{id:239,de:"den Gürtel enger schnallen",lit:"to buckle the belt tighter",ph:"GÜR-tel",en:"to tighten one's belt / cut back",fa:"کمربندها را سفت‌تر بستن، صرفه‌جویی کردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Dieses Jahr müssen wir den Gürtel enger schnallen.",xen:"This year we have to tighten our belts.",y:"Redewendung"},
{id:240,de:"jdn. in den Schatten stellen",lit:"to put sb in the shadow",ph:"SCHAT-ten schtel-len",en:"to outshine / overshadow sb",fa:"کسی را تحت‌الشعاع قرار دادن، رو دست کسی زدن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Ihr Talent stellt alle anderen in den Schatten.",xen:"Her talent outshines everyone else.",y:"Redewendung"},
{id:241,de:"sich ins Fäustchen lachen",lit:"to laugh into one's little fist",ph:"FOIST-chen",en:"to laugh up one's sleeve",fa:"زیرزیرکی خندیدن، توی دلش خندیدن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Er lachte sich ins Fäustchen über ihren Fehler.",xen:"He laughed up his sleeve at her mistake.",y:"Redewendung"},
{id:242,de:"jdm. die Leviten lesen",lit:"to read sb the Levites",ph:"le-VII-ten",en:"to read sb the riot act / tell off",fa:"کسی را حسابی سرزنش کردن، توبیخ کردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Der Chef hat ihm gehörig die Leviten gelesen.",xen:"The boss read him the riot act.",y:"Redewendung"},
{id:243,de:"auf dem Teppich bleiben",lit:"to stay on the carpet",ph:"TEP-pich",en:"to keep one's feet on the ground",fa:"پا روی زمین ماندن، واقع‌بین بودن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Bleib mal auf dem Teppich, so toll war es nicht.",xen:"Keep your feet on the ground, it wasn't that great.",y:"Redewendung"},
{id:244,de:"sich etwas hinter die Ohren schreiben",lit:"to write sth behind one's ears",ph:"OH-ren SCHRAI-ben",en:"to get sth into one's head / remember it well",fa:"چیزی را آویزه‌ی گوش کردن، خوب به خاطر سپردن",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Das kannst du dir hinter die Ohren schreiben!",xen:"You'd better get that into your head!",y:"Redewendung"},
{id:245,de:"Tacheles reden",lit:"to talk Tacheles",ph:"TA-che-les",en:"to talk turkey / speak plainly",fa:"رک و پوست‌کنده حرف زدن",t:"idiom",f:2,reg:"du",rg:"Berlin",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Lass uns mal Tacheles reden.",xen:"Let's talk straight.",y:"Redewendung (jidd. Ursprung)"},
{id:246,de:"jdm. ein Dorn im Auge sein",lit:"to be a thorn in sb's eye",ph:"dorn im AU-ge",en:"to be a thorn in sb's side",fa:"خار چشمِ کسی بودن، مایه‌ی آزار بودن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Die Baustelle ist den Anwohnern ein Dorn im Auge.",xen:"The construction site is a thorn in the residents' side.",y:"Redewendung"},
{id:247,de:"die erste Geige spielen",lit:"to play the first violin",ph:"GAI-ge",en:"to call the shots / be top dog",fa:"ساز اول را زدن، حرفِ آخر را زدن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Im Team spielt sie eindeutig die erste Geige.",xen:"On the team she clearly calls the shots.",y:"Redewendung"},
{id:248,de:"Hals- und Beinbruch",lit:"neck and leg break",ph:"hals und BAIN-bruch",en:"break a leg / good luck",fa:"موفق باشی (معادل شوخیِ «گردن و پا بشکنه»)",t:"idiom",f:2,reg:"du",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Morgen ist deine Premiere – Hals- und Beinbruch!",xen:"Tomorrow is your premiere – break a leg!",y:"Redewendung"},
{id:249,de:"jdm. auf den Zahn fühlen",lit:"to feel sb on the tooth",ph:"tsahn FÜH-len",en:"to sound sb out / grill them",fa:"کسی را سبک‌سنگین کردن، زیر سؤال بردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:0,xde:"Im Interview haben sie ihm gründlich auf den Zahn gefühlt.",xen:"In the interview they grilled him thoroughly.",y:"Redewendung"},
{id:250,de:"das Eis brechen",lit:"to break the ice",ph:"ais BRE-chen",en:"to break the ice",fa:"یخ را شکستن، فضا را باز کردن",t:"idiom",f:3,reg:"neutral",rg:"Allgemein",gn:"Timeless",w:"",od:0,mo:"",core:1,xde:"Ein Witz half, das Eis zu brechen.",xen:"A joke helped break the ice.",y:"Redewendung"}

  $("#searchInp").addEventListener("input",e=>{learnState.q=e.target.value;drawCards();});
  $("#regionSel").addEventListener("change",e=>{learnState.region=e.target.value;drawCards();});
  $("#genSel").addEventListener("change",e=>{learnState.gen=e.target.value;drawCards();});
  $("#sortSel").addEventListener("change",e=>{learnState.sort=e.target.value;drawCards();});
  drawCards();
}
function drawCards(){
  const grid=$("#cardsGrid");if(!grid)return;
  let list=DATA.filter(d=>d.t===learnState.tab);
  const q=learnState.q.trim().toLowerCase();
  if(q)list=list.filter(d=>(d.de+" "+d.en+" "+d.fa+" "+d.xde).toLowerCase().includes(q));
  if(learnState.region)list=list.filter(d=>d.rg===learnState.region);
  if(learnState.gen)list=list.filter(d=>d.gn===learnState.gen);
  if(learnState.sort==="alpha")list.sort((a,b)=>a.de.localeCompare(b.de,"de"));
  else if(learnState.sort==="core")list.sort((a,b)=>(b.core-a.core)||a.de.localeCompare(b.de,"de"));
  else list.sort((a,b)=>b.id-a.id);
  grid.innerHTML="";
  if(!list.length){grid.innerHTML='<p class="muted" style="grid-column:1/-1;text-align:center;padding:40px">🤷 —</p>';return;}
  list.forEach((it,i)=>grid.appendChild(exprCard(it,i)));
}

let sess=null;
function poolFor(ids){if(ids&&ids.length){const s=ids.map(id=>DATA.find(d=>d.id===id)).filter(Boolean);if(s.length)return s;}return DATA.slice();}
function startMode(mode,ids){
  if(!S.modesTried.includes(mode)){S.modesTried.push(mode);save();checkBadges();}
  S.lastView="practice";save();syncToggles();
  const c=$("#content");c.innerHTML="";const wrap=el("div","view");c.appendChild(wrap);
  const n=mode==="match"?6:8;const pool=shuffle(poolFor(ids));
  sess={mode,items:pool.slice(0,Math.min(n,pool.length)),all:pool,i:0,correct:0,total:0,xp:0};
  if(mode==="scenario")sess.items=shuffle(SCENARIOS).slice(0,6);
  if(mode==="register")sess.items=shuffle(REGISTER).slice(0,6);
  renderSessionFrame(wrap,mode);runMode();
}
function renderSessionFrame(wrap,mode){const md=MODES.find(m=>m[0]===mode);
  wrap.innerHTML=`

}
function updHud(){if($("#sessXp"))$("#sessXp").textContent=sess.xp;const acc=sess.total?Math.round(sess.correct/sess.total*100):100;if($("#sessAcc"))$("#sessAcc").textContent="🎯 "+acc+"%";
  if($("#qCount")&&sess.mode!=="match"){$("#qCount").textContent=(sess.i+1)+" / "+sess.items.length;$("#qProg").style.width=(sess.i/sess.items.length*100)+"%";}}
function gain(x,ev){sess.xp+=x;addXP(x,ev);updHud();}
function nextQ(){sess.i++;if(sess.i>=sess.items.length)finishSession();else runMode();}
function runMode(){const m=sess.mode;
  if(m==="flashcards")mFlash();else if(m==="mcq")mMCQ();else if(m==="fill")mFill();else if(m==="match")mMatch();
  else if(m==="reorder")mReorder();else if(m==="scenario")mScenario();else if(m==="register")mRegister();
  else if(m==="translate")mTranslate();updHud();}
function finishSession(){
  const acc=sess.total?Math.round(sess.correct/sess.total*100):0;let bonus=25;if(acc===100&&sess.total>=4){bonus=100;unlockBadge("perfect");}
  addXP(bonus);if(acc===100&&sess.total>=4)confetti(160);else reactMascot("bounce");
  const stage=$("#stage");if(!stage)return;if($("#qProg"))$("#qProg").style.width="100%";
  stage.innerHTML=`<div class="q-card card center"><div style="font-size:3rem">${acc>=80?"🎉":acc>=50?"👍":"💪"}</div><h2 style="margin:6px 0 16px">${t("session_done")}</h2>

    <div class="summary-stat"><span>${t("accuracy")}</span><b>${acc}% (${sess.correct}/${sess.total})</b></div>

  $("#againBtn").onclick=()=>startMode(sess.mode);$("#doneBtn").onclick=()=>setView("practice");

/* shared */
function distractMeanings(item,n){return shuffle(sess.all.filter(d=>d.id!==item.id&&d.en!==item.en)).slice(0,n).map(d=>d.en);}
function distractDe(item,n){let r=shuffle(sess.all.filter(d=>d.id!==item.id&&d.t===item.t)).slice(0,n).map(d=>d.de);if(r.length<n){for(const m of shuffle(sess.all)){if(r.length>=n)break;if(m.id!==item.id&&!r.includes(m.de))r.push(m.de);}}return r;}
function answerOpts(stage,opts,ci,expl,onDone){const box=stage.querySelector(".opts");
  $$(".opt",box).forEach((o,i)=>o.onclick=()=>{if(box.dataset.locked)return;box.dataset.locked="1";const ok=i===ci;o.classList.add(ok?"correct":"wrong");if(!ok)$$(".opt",box)[ci].classList.add("correct");
    reactMascot(ok?"bounce":"shake");sess.total++;if(ok){sess.correct++;gain(10,{target:o});}onDone&&onDone(ok);
    if(expl){const e=el("div","expl","💡 "+expl);box.parentElement.appendChild(e);}
    const nb=el("button","btn red sm",t("next")+" →");nb.style.marginTop="14px";nb.onclick=()=>nextQ();box.parentElement.appendChild(nb);});}

const LESSON={};
function LF(id,o){ LESSON[id]=o; }
function LU(id,o){ LESSON[id]=LESSON[id]||{}; Object.assign(LESSON[id],o); }
function Len(obj){ return obj? (obj.en||obj.de||"") : ""; }
function lessonData(it){
  const Lz=LESSON[it.id]||{}, e=ENRICH[it.id]||{};
  return {
    mean: Lz.mean || {en:it.en, fa:it.fa},
    use: Lz.use || e.note || {en:regGuide(it),fa:regGuide(it)},
    avoid: Lz.avoid || (it.w? {en:"⚠️ "+it.w, fa:"⚠️ "+it.w} : (it.od? {en:"Now considered outdated — see the modern alternative.",fa:"امروزه قدیمی است — جایگزین مدرن را ببین."} : {en:"No special restrictions on register.",fa:"محدودیت خاصی در سطح زبانی ندارد."})),
    ex: (Lz.ex&&Lz.ex.length)?Lz.ex:([[it.xde,it.xen]].concat(e.ex||[])),
    syn: (Lz.syn&&Lz.syn.length)?Lz.syn:(e.syn||[]),
    opp: Lz.opp||[],
    mistake: Lz.mistake || e.note || "",
    check: Lz.check||null,
    origin: e.gram || (it.lit? {en:"literally: „"+it.lit+"“"+(it.y?" · "+it.y:""), fa:"تحت‌اللفظی: «"+it.lit+"»"} : (it.y? {en:it.y,fa:it.y} : ""))
  };
}
function explL(){ return S.explLang || (S.lang==="fa"?"fa":"en"); }
function LX(field){ if(!field)return ""; const l=explL();
  if(typeof field==="string") return esc(field);
  const en=field.en||field.de||"", fa=field.fa||"";
  if(l==="fa") return '<span dir="rtl" style="font-family:Vazirmatn,Inter;display:block">'+esc(fa||en)+'</span>';
  if(l==="both"){ let h=""; if(en)h+='<span>'+esc(en)+'</span>'; if(fa)h+='<div dir="rtl" style="margin-top:7px;padding-top:7px;border-top:1px dashed var(--border);color:var(--text-2);font-family:Vazirmatn,Inter">'+esc(fa)+'</div>'; return h; }
  return esc(en||fa);
}

/* ===== LESSONS: Jugendsprache 1 ===== */
LF(1,{mean:{en:"An all-purpose verbal shrug. You say it when you're a bit speechless or don't really want to comment — like 'huh, okay' or 'wow, wild'.",fa:"یک واکنشِ همه‌منظوره وقتی حرفی برای گفتن نداری — مثل «اوهوم، باشه» یا «عجب»."},
 use:"Among friends/Gen-Z, as a low-effort reaction to surprising or annoying news. Tone is dry and a bit detached.",
 avoid:"Never in formal/written German or with strangers — it sounds careless. It is NOT the adjective 'crazy'; you can't put it inside a sentence.",
 ex:[["— Ich hab heute drei Klausuren. — Ey, das crazy.","— I've got three exams today. — Whoa, das crazy."],["— Er ist einfach gegangen. — Das crazy, echt.","— He just left. — That's wild, honestly."],["Das crazy, dass das wirklich passiert ist.","Crazy that this actually happened."]],
 syn:["krass","wild","heftig"],opp:["mega langweilig"],
 mistake:"Don't translate it as 'das ist verrückt'. 'das crazy' is a frozen reaction phrase, used standalone.",
 check:{q:"Where does 'das crazy' fit best?",opts:["In a job application","As a casual reaction to surprising news","In a polite email"],a:1}});
LF(4,{mean:{en:"A friendly address term — 'bro', 'mate', 'dude'. It signals closeness and a relaxed vibe, and works for any gender despite sounding masculine.",fa:"واژه‌ی خطابِ دوستانه — «داداش/رفیق». نشانه‌ی صمیمیت است و برای هر جنسیتی به‌کار می‌رود."},
 use:"With friends, to grab attention, react, or just pepper a sentence. Hamburg origin, now nationwide.",
 avoid:"Never with teachers, bosses, officials or older strangers — it's very informal and can read as disrespectful.",
 ex:[["Digga, hast du das gesehen?","Bro, did you see that?"],["Ey Digga, komm mal her!","Hey dude, come here!"],["Das war knapp, Digga.","That was close, man."]],
 syn:["Alter","Bro","Bruder","Diggi"],opp:["Herr Müller (formell)"],
 mistake:"It comes from 'Dicker' (lit. 'fat one') but has nothing to do with weight — don't take it literally.",
 check:{q:"Who can you safely call 'Digga'?",opts:["Your professor","A close friend","A police officer"],a:1}});
LF(5,{mean:{en:"'kinda / a little / secretly'. It softens a statement or admits something quietly, without making a big deal of it.",fa:"«یه‌جورایی / کمی / یواشکی». یک جمله را ملایم می‌کند یا چیزی را آرام اعتراف می‌کند."},
 use:"Mixed into sentences as an adverb, usually before the thing you're downplaying. Opposite is 'highkey' (openly).",
 avoid:"Formal writing. Overusing it in one sentence sounds try-hard.",
 ex:[["Ich find den Film lowkey richtig gut.","I lowkey really like that film."],["Bin lowkey nervös wegen morgen.","I'm kinda nervous about tomorrow."],["Das war lowkey das beste Essen ever.","That was lowkey the best food ever."]],
 syn:["ein bisschen","insgeheim","heimlich"],opp:["highkey","total offensichtlich"],
 mistake:"It's an adverb, not a noun. Don't say 'ein Lowkey'. Place it before the adjective/verb you soften.",
 check:{q:"'lowkey' is the opposite of…",opts:["highkey","lowfi","lonely"],a:0}});
LF(8,{mean:{en:"Your presence, charisma or 'energy' — the impression you give off. Often counted in joke points: you gain or lose 'aura'.",fa:"حال‌وهوا، کاریزما یا «انرژی» که از خود ساطع می‌کنی — اغلب به‌شوخی امتیازی شمرده می‌شود."},
 use:"Playfully, to praise (or mock) someone's cool factor. '+1000 Aura' for a smooth move, '−5000 Aura' for an embarrassing one.",
 avoid:"Formal contexts. Taking it literally — it's a meme, not a real measurement.",
 ex:[["Vor allen hingefallen. −5000 Aura.","Fell in front of everyone. −5000 aura."],["Er hat sie gerettet — pure Aura.","He saved her — pure aura."],["Mit der Sonnenbrille hast du Aura.","With those shades you've got aura."]],
 syn:["Ausstrahlung","Vibe","Charisma"],opp:["cringe","peinlich"],
 mistake:"In slang 'Aura' is about coolness/status, not the spiritual 'energy field'. Context makes the joke.",
 check:{q:"You trip in public. That's…",opts:["+1000 Aura","−5000 Aura","neutral"],a:1}});
LF(11,{mean:{en:"Charm — specifically the skill of flirting and winning people over. 'Rizz haben' = to have game.",fa:"کاریزمای دلبری — مهارتِ لاس‌زدن و جذبِ دیگران. «Rizz haben» یعنی بلد بودنِ مخ‌زدن."},
 use:"Joking with friends about dating/charm. The verb 'rizzen' (to flirt) also exists.",
 avoid:"Formal settings. Clipped from 'charisma' — keep it casual.",
 ex:[["Der hat so viel Rizz, jede mag ihn.","He's got so much rizz, everyone likes him."],["Null Rizz, der Arme.","Zero rizz, poor guy."],["Versuch mal etwas Rizz!","Try a bit of charm!"]],
 syn:["Charme","Anziehung","Game"],opp:["kein Rizz","cringe"],
 mistake:"It's a noun ('Rizz haben'); the verb 'rizzen' exists but is rarer. Don't overformalize it.",
 check:{q:"'Rizz' is mainly about…",opts:["money","flirting charm","sports"],a:1}});
LF(13,{mean:{en:"To absolutely nail it / look amazing. An exclamation of admiration when someone performs or looks great.",fa:"ترکوندن / محشر بودن. ندای تحسین وقتی کسی عالی ظاهر می‌شود یا کاری را عالی انجام می‌دهد."},
 use:"To hype someone up — outfits, performances, achievements. Gender-neutral.",
 avoid:"Formal German. It can sound ironic if overused.",
 ex:[["Dein Outfit heute? Slay!","Your outfit today? Slay!"],["Sie hat die Prüfung gemeistert — slay!","She aced the exam — slay!"],["Mom, du slayst in dem Kleid!","Mom, you slay in that dress!"]],
 syn:["geil","mega","top"],opp:["flop","cringe"],
 mistake:"Can be a verb ('du slayst') or an exclamation. Both are fine; just keep it informal.",
 check:{q:"You'd say 'Slay!' to…",opts:["criticize someone","celebrate someone looking/doing great","ask a question"],a:1}});
LF(14,{mean:{en:"Short for 'suspicious' — something or someone seems off, shady or not trustworthy.",fa:"کوتاه‌شده‌ی «مشکوک» — کسی یا چیزی غیرعادی یا مشکوک به‌نظر می‌رسد."},
 use:"For people, stories or situations that don't add up. Light and joking, from the game Among Us.",
 avoid:"Formal writing. Accusing someone seriously — it's playful, not a real accusation.",
 ex:[["Warum lächelt der so? Voll sus.","Why's he smiling like that? Super sus."],["Die Story klingt sus.","That story sounds sus."],["Sus, dass er plötzlich Zeit hat.","Sus that he suddenly has time."]],
 syn:["verdächtig","komisch","fragwürdig"],opp:["legit","vertrauenswürdig"],
 mistake:"From 'suspicious', popularized by Among Us (2020). It's an adjective: 'das ist sus'.",
 check:{q:"Something 'sus' is…",opts:["trustworthy","suspicious/off","expensive"],a:1}});
LF(15,{mean:{en:"Second-hand embarrassment — that toe-curling feeling when something is so awkward you cringe for the other person.",fa:"خجالت به‌جای دیگری — آن حسِ ناجور وقتی چیزی آن‌قدر ضایع است که جای طرف خجالت می‌کشی."},
 use:"Adjective ('das ist cringe') or noun. Now totally mainstream, all ages.",
 avoid:"Very formal contexts. Otherwise widely accepted.",
 ex:[["Papa tanzt auf der Hochzeit — so cringe.","Dad dancing at the wedding — so cringe."],["Sein Witz war einfach cringe.","His joke was just cringe."],["Mir ist das so cringe, ich kann nicht hinsehen.","It's so cringe I can't look."]],
 syn:["peinlich","fremdschämen","unangenehm"],opp:["cool","based"],
 mistake:"English 'to cringe' = to recoil. In German it's used as an adjective/noun, not usually a verb.",
 check:{q:"'Cringe' describes…",opts:["pride","awkward embarrassment","hunger"],a:1}});

LF(17,{mean:{en:"Clueless, confused, out of the loop — not knowing what's going on.",fa:"گیج، سردرگم، بی‌خبر."},use:"To admit you're lost in a topic; gentle, self-deprecating.",avoid:"Formal writing; not for losing objects.",mistake:"Use it for a state ('ich bin lost'), not for a lost item.",syn:["ahnungslos","planlos"],opp:["im Bilde"],check:{q:"'Ich bin lost' means…",opts:["I'm winning","I'm clueless","I'm tired"],a:1}});

LF(22,{mean:{en:"'Lie / no lie' — cap = lie, no cap = honestly, for real.",fa:"«دروغ / بدون دروغ»."},use:"Stressing honesty; casual.",avoid:"Formal German.",mistake:"'No cap' = no lie; 'cap' alone calls out a lie.",syn:["echt","ehrlich"],opp:["cap (Lüge)"],check:{q:"'No cap' means…",opts:["maybe","honestly","never"],a:1}});

LF(25,{mean:{en:"An extremely cool outfit or great style — 'the drip'.",fa:"استایل و لباسِ فوق‌العاده باحال."},use:"Complimenting a look; casual.",avoid:"Formal contexts.",mistake:"Newer/cooler than 'Swag'; about appearance.",syn:["Style","Look"],opp:["cheugy"],check:{q:"'Drip' refers to…",opts:["the weather","a cool outfit","a drink"],a:1}});
