/* ===== IDIOM DEEP USE 1 ===== */
LU(201,{use:{en:"Use it the moment a friend, classmate or colleague is about to do something where luck or skill matters — an exam, a job interview, a driving test, a date, a doctor's result. You say it as a warm send-off, usually with the gesture (thumb folded inside the fist, never crossed fingers). Typical frames: 'Ich drück dir die Daumen!', 'Ich drück dir ganz fest die Daumen für morgen.', 'Wir drücken euch alle die Daumen.' It works at any politeness level — friends, family, even a boss to an employee — so you can use it almost anywhere.",fa:"همان لحظه‌ای به‌کار ببر که دوست، هم‌کلاسی یا همکارت می‌خواهد کاری انجام دهد که شانس یا مهارت در آن مهم است — امتحان، مصاحبه‌ی کاری، آزمونِ رانندگی، قرار، یا جوابِ آزمایش. این را مثلِ یک بدرقه‌ی گرم می‌گویی، معمولاً همراهِ ژستِ مخصوص (شست را تویِ مشت تا می‌کنی، نه انگشت‌ها را قلاب). قالب‌های رایج: «Ich drück dir die Daumen!»، «Ich drück dir ganz fest die Daumen für morgen.»، «Wir drücken euch alle die Daumen.» در هر سطحی از ادب جواب می‌دهد — با دوست، خانواده، حتی رئیس به کارمند."},avoid:{en:"Don't cross your fingers physically — Germans won't read that as luck; press the thumb. And don't use it for things already decided or in the past.",fa:"انگشت‌ها را به‌صورت فیزیکی قلاب نکن — آلمان‌ها آن را نشانه‌ی شانس نمی‌دانند؛ شست را فشار بده. برای چیزی که قبلاً تمام یا تصمیم‌گیری شده به‌کار نبر."},mistake:{en:"Don't say 'die Finger kreuzen' — the natural German is 'die Daumen drücken'.",fa:"نگو «die Finger kreuzen» — آلمانیِ طبیعی «die Daumen drücken» است."}});
LU(202,{use:{en:"Use it right after a near-miss or a lucky escape, to comment that someone got lucky rather than skilled. Classic moment: the bus pulls away but a second one arrives instantly, you almost failed but just passed, you nearly got a ticket but the officer let you off. Frames: 'Da hast du (nochmal) Schwein gehabt!', 'So ein Schwein!', 'Wir hatten echt Schwein.' Tone is light and a bit teasing — among friends and colleagues. It comments on luck after the fact, never as a wish beforehand (for that you say 'viel Glück').",fa:"درست بعد از یک خطرِ ازبیخ‌گذشته یا شانسِ ناگهانی به‌کار ببر، تا بگویی کسی شانس آورد نه اینکه ماهر بود. لحظه‌ی کلاسیک: اتوبوس می‌رود اما فوراً یکی دیگر می‌رسد؛ نزدیک بود رد شوی ولی قبول شدی؛ نزدیک بود جریمه شوی اما پلیس بخشید. قالب‌ها: «Da hast du nochmal Schwein gehabt!»، «So ein Schwein!»، «Wir hatten echt Schwein.» لحنش سبک و کمی شوخ است — بینِ دوستان و همکاران. همیشه بعد از ماجرا گفته می‌شود، نه به‌عنوان آرزو از قبل (برای آن «viel Glück» می‌گویی)."},avoid:{en:"Never as a wish before the event — only after luck has already happened. And keep it informal; in a formal report you'd say 'Glück gehabt'.",fa:"هرگز به‌عنوان آرزو قبل از رویداد نه — فقط بعد از اینکه شانس اتفاق افتاد. غیررسمی نگهش دار؛ در گزارشِ رسمی «Glück gehabt» بگو."},mistake:{en:"Don't confuse 'Schwein haben' (to be lucky) with 'Du Schwein!' (you pig! — an insult). The verb 'haben' makes it about luck.",fa:"«Schwein haben» (شانس آوردن) را با «Du Schwein!» (توهین) اشتباه نگیر. فعلِ «haben» آن را به شانس مربوط می‌کند."}});
LU(203,{use:{en:"Use it when your patience has run out with a recurring situation — a job, a person's behaviour, noise, drama, a task you keep redoing. It's stronger than 'das nervt': it signals you're at your limit and ready to act (quit, leave, say something). Frames: 'Ich hab die Nase voll von …', 'Langsam hab ich echt die Nase voll.', 'Ich hab die Nase gestrichen voll!' (extra strong). Use 'von + Dativ' for the thing: 'die Nase voll von dem Stress'. Fine among friends and at work in informal moments.",fa:"وقتی صبرت از یک وضعیتِ تکراری تمام شده به‌کار ببر — یک شغل، رفتارِ یک نفر، سروصدا، دردسر، یا کاری که مدام تکرارش می‌کنی. قوی‌تر از «das nervt» است: یعنی به مرزت رسیده‌ای و آماده‌ای کاری کنی (استعفا، رفتن، چیزی گفتن). قالب‌ها: «Ich hab die Nase voll von …»، «Langsam hab ich echt die Nase voll.»، «Ich hab die Nase gestrichen voll!» (خیلی قوی). برای آن چیز «von + داتیو»: «die Nase voll von dem Stress». بینِ دوستان و در محیطِ کارِ غیررسمی مناسب است."},avoid:{en:"It's informal-to-blunt; in a polite complaint to a stranger or official, prefer 'Ich bin damit nicht mehr zufrieden'. Don't use it for a one-time minor annoyance — it implies a built-up, repeated frustration.",fa:"غیررسمی تا تند است؛ در شکایتِ مؤدبانه به غریبه یا اداره «Ich bin damit nicht mehr zufrieden» بهتر است. برای آزارِ کوچکِ یک‌باره به‌کارش نبر — معنایش خستگیِ انباشته و تکراری است."},mistake:{en:"Remember the preposition: 'die Nase voll VON etwas' (Dativ), not 'über'.",fa:"حرفِ اضافه یادت باشد: «die Nase voll VON etwas» (داتیو)، نه «über»."}});
LU(206,{use:{en:"Use it to praise someone (or admit) that a statement is exactly right — it captures the heart of the matter perfectly. Great in discussions, feedback, meetings, even fairly formal ones, because it's neutral and respected. Frames: 'Damit hast du den Nagel auf den Kopf getroffen.', 'Das trifft den Nagel auf den Kopf.', 'Du hast es auf den Punkt gebracht — den Nagel auf den Kopf.' Say it after someone nails an analysis, a diagnosis of a problem, or the perfect word.",fa:"برای تحسینِ کسی (یا اعترافِ خودت) به‌کار ببر که حرفی دقیقاً درست بوده و قلبِ مطلب را کامل گرفته. در بحث، بازخورد و جلسه — حتی نسبتاً رسمی — عالی است چون خنثی و محترمانه است. قالب‌ها: «Damit hast du den Nagel auf den Kopf getroffen.»، «Das trifft den Nagel auf den Kopf.» بعد از اینکه کسی یک تحلیل، تشخیصِ مشکل یا واژه‌ی دقیق را می‌گوید، این را بگو."},avoid:{en:"It praises accuracy, not effort or kindness — don't use it just to be nice if the point wasn't actually spot-on.",fa:"این دقت را می‌ستاید، نه تلاش یا مهربانی را — اگر حرف واقعاً دقیق نبوده، صرفاً برای خوش‌آمد به‌کارش نبر."},mistake:{en:"It's 'den Nagel auf den KOPF treffen' (the head of the nail). Don't drop 'auf den Kopf'.",fa:"«den Nagel auf den KOPF treffen» است (سرِ میخ). «auf den Kopf» را حذف نکن."}});
LU(210,{use:{en:"Use it to criticize avoidance: when someone refuses to face a clear problem and hopes it disappears — unpaid bills, a failing grade, a conflict they won't address. Often as advice/rebuke: 'Steck nicht den Kopf in den Sand!', or describing someone: 'Er steckt bei Problemen immer den Kopf in den Sand.' Works from friendly nudge to serious workplace feedback; the tone depends on yours, the idiom itself is neutral.",fa:"برای نقدِ فرار به‌کار ببر: وقتی کسی از رویاروییِ یک مشکلِ آشکار طفره می‌رود و امید دارد خودبه‌خود حل شود — قبض‌های پرداخت‌نشده، نمره‌ی افتاده، تعارضی که حاضر نیست حلش کند. اغلب به‌صورتِ توصیه/سرزنش: «Steck nicht den Kopf in den Sand!» یا توصیفِ کسی: «Er steckt bei Problemen immer den Kopf in den Sand.» از تلنگرِ دوستانه تا بازخوردِ جدیِ کاری کار می‌کند؛ لحن به تو بستگی دارد، خودِ اصطلاح خنثی است."},avoid:{en:"It's about avoidance, not laziness or stupidity — use it only when someone is ignoring a real problem.",fa:"درباره‌ی فرار است، نه تنبلی یا حماقت — فقط وقتی به‌کارش ببر که کسی مشکلِ واقعی را نادیده می‌گیرد."},mistake:{en:"Keep the verb 'stecken' (to stick): 'den Kopf in den Sand stecken', not 'setzen' or 'legen'.",fa:"فعلِ «stecken» را نگه دار: «den Kopf in den Sand stecken»، نه «setzen» یا «legen»."}});
LU(248,{use:{en:"Use it to wish someone good luck before a performance, premiere, big presentation, exam or any high-stakes 'show' moment — exactly like English 'break a leg'. Frames: 'Na dann, Hals- und Beinbruch!', 'Ich wünsch dir Hals- und Beinbruch für morgen.' It's warm and slightly playful; fine among friends, family and colleagues. Especially common in theatre, music and sports.",fa:"برای آرزویِ موفقیت قبل از اجرا، افتتاحیه، ارائه‌ی بزرگ، امتحان یا هر لحظه‌ی پراهمیتِ «نمایش‌گونه» به‌کار ببر — دقیقاً مثلِ «break a leg» انگلیسی. قالب‌ها: «Na dann, Hals- und Beinbruch!»، «Ich wünsch dir Hals- und Beinbruch für morgen.» گرم و کمی بازیگوشانه است؛ بینِ دوستان، خانواده و همکاران مناسب است. به‌ویژه در تئاتر، موسیقی و ورزش رایج است."},avoid:{en:"Despite the words ('neck and leg break'), it is a POSITIVE wish — never say it as a threat. Don't use it after the event.",fa:"باوجودِ واژه‌ها («شکستنِ گردن و پا»)، این یک آرزویِ مثبت است — هرگز به‌صورتِ تهدید نگو. بعد از رویداد به‌کارش نبر."},mistake:{en:"Don't take it literally or 'fix' it to sound nicer — the broken-sounding form IS the idiom (likely from Yiddish 'hatslokhe').",fa:"تحت‌اللفظی نگیر و «اصلاحش» نکن — همین شکلِ به‌ظاهر بد، خودِ اصطلاح است (احتمالاً از ییدیشِ «hatslokhe»)."}});

/* ===== IDIOM DEEP USE 2 ===== */
LU(204,{use:{en:"Use it to tease someone who failed to see something that was right in front of them — keys on the table, a typo, an obvious sign. Frame: 'Hast du Tomaten auf den Augen?' or 'Der hatte wohl Tomaten auf den Augen.' Playful and informal, among friends/family.",fa:"برای دست‌انداختنِ کسی که چیزِ کاملاً جلوِ چشمش را ندیده به‌کار ببر — کلید روی میز، یک غلطِ تایپی، یک تابلوی واضح. قالب: «Hast du Tomaten auf den Augen?» شوخ و غیررسمی، بینِ دوستان/خانواده."},avoid:{en:"It's teasing — don't use it seriously or with someone you must stay polite with.",fa:"شوخی است — جدی یا با کسی که باید مؤدب بمانی به‌کارش نبر."},mistake:{en:"Plural: 'Tomaten auf den AUGEN', not 'Auge'.",fa:"جمع: «Tomaten auf den AUGEN»، نه «Auge»."}});
LU(207,{use:{en:"Use it to warn against accepting or buying something unchecked — a flat without a viewing, a used car without a test, a deal with no details. Frame: 'Kauf nicht die Katze im Sack — schau es dir vorher an.' Neutral; fine in everyday and semi-formal advice.",fa:"برای هشدار در برابرِ پذیرفتن یا خریدنِ چیزی به‌صورتِ نسنجیده به‌کار ببر — خانه بدون بازدید، ماشینِ دست‌دوم بدون تست، معامله بدونِ جزئیات. قالب: «Kauf nicht die Katze im Sack — schau es dir vorher an.» خنثی؛ در توصیه‌ی روزمره و نیمه‌رسمی مناسب است."},avoid:{en:"It's about buying/accepting blindly — not about secrets in general.",fa:"درباره‌ی خریدن/پذیرفتنِ کورکورانه است — نه رازها به‌طورِ کلی."},mistake:{en:"Keep 'im Sack' (in the bag/sack).",fa:"«im Sack» را نگه دار."}});
LU(208,{use:{en:"Use it the instant a worry is resolved and you feel relief — a result comes back fine, a missing person calls, a problem clears. Frame: 'Da fällt mir ein Stein vom Herzen!' or 'Mir ist ein Stein vom Herzen gefallen.' Warm, works in most registers.",fa:"همان لحظه‌ای که نگرانی برطرف می‌شود و احساسِ آسودگی می‌کنی به‌کار ببر — جواب خوب می‌آید، فردِ گم‌شده زنگ می‌زند، مشکلی حل می‌شود. قالب: «Da fällt mir ein Stein vom Herzen!» گرم؛ در بیشترِ سطوح کار می‌کند."},avoid:{en:"It expresses relief AFTER the fact, not hope before.",fa:"آسودگیِ بعد از ماجرا را می‌رساند، نه امیدِ قبل از آن."},mistake:{en:"It's 'ein Stein' (a stone) 'vom Herzen' — singular.",fa:"«ein Stein» (یک سنگ) «vom Herzen» — مفرد."}});
LU(209,{use:{en:"Use it to calm an overreaction — when someone is blowing a small thing out of proportion. Frame: 'Jetzt lass mal die Kirche im Dorf!' Slightly cheeky but friendly; common among friends, family and relaxed colleagues.",fa:"برای آرام‌کردنِ واکنشِ افراطی به‌کار ببر — وقتی کسی چیزِ کوچکی را بزرگ می‌کند. قالب: «Jetzt lass mal die Kirche im Dorf!» کمی شیطنت‌آمیز اما دوستانه؛ بینِ دوستان، خانواده و همکارانِ راحت رایج است."},avoid:{en:"It tells someone to dial it down — don't use it about genuinely serious matters.",fa:"به طرف می‌گوید کمی کوتاه بیاید — درباره‌ی مسائلِ واقعاً جدی به‌کارش نبر."},mistake:{en:"Fixed wording: 'die Kirche im Dorf lassen'.",fa:"عبارتِ ثابت: «die Kirche im Dorf lassen»."}});
LU(215,{use:{en:"Use it to admit total confusion after an explanation, lecture or set of instructions. Frame: 'Ich versteh nur Bahnhof.' or 'Bei dem Vortrag hab ich nur Bahnhof verstanden.' Casual and self-deprecating; among friends/colleagues, not in a formal report.",fa:"برای اعترافِ گیجیِ کامل بعد از یک توضیح، سخنرانی یا دستورالعمل به‌کار ببر. قالب: «Ich versteh nur Bahnhof.» خودمانی و خودتخریب‌گرانه؛ بینِ دوستان/همکاران، نه در گزارشِ رسمی."},avoid:{en:"Informal — in a formal setting say 'Das habe ich nicht verstanden'.",fa:"غیررسمی — در موقعیتِ رسمی «Das habe ich nicht verstanden» بگو."},mistake:{en:"Fixed: 'nur Bahnhof verstehen'.",fa:"ثابت: «nur Bahnhof verstehen»."}});
LU(217,{use:{en:"Use it when you decide to tell someone the unvarnished truth, especially something they may not want to hear — bad news, a hard fact, an honest assessment. Frame: 'Ich schenk dir reinen Wein ein: …' Neutral; works from friends to workplace.",fa:"وقتی تصمیم می‌گیری حقیقتِ بی‌پرده را به کسی بگویی، به‌ویژه چیزی که شاید دوست نداشته باشد بشنود — خبرِ بد، واقعیتِ سخت، ارزیابیِ صادقانه. قالب: «Ich schenk dir reinen Wein ein: …» خنثی؛ از دوستان تا محیطِ کار."},avoid:{en:"It means full honesty — don't use it for small talk or trivial info.",fa:"یعنی صداقتِ کامل — برای گپِ سطحی یا اطلاعاتِ بی‌اهمیت به‌کارش نبر."},mistake:{en:"Verb is 'einschenken' (to pour).",fa:"فعل «einschenken» است."}});
LU(218,{use:{en:"Use it to urge decisive, head-on action on a problem someone keeps avoiding — make the call, start the project, address the conflict. Frame: 'Pack den Stier bei den Hörnern!' Motivating; fine in coaching, work and friendly contexts.",fa:"برای ترغیب به اقدامِ قاطع و رودررو روی مشکلی که کسی مدام از آن طفره می‌رود به‌کار ببر — تماس را بگیر، پروژه را شروع کن، تعارض را حل کن. قالب: «Pack den Stier bei den Hörnern!» انگیزه‌بخش؛ در کوچینگ، کار و فضای دوستانه مناسب."},avoid:{en:"It's about taking action — not about aggression toward a person.",fa:"درباره‌ی اقدام است — نه پرخاش به یک شخص."},mistake:{en:"Keep 'bei den Hörnern' (Dativ).",fa:"«bei den Hörnern» (داتیو) را نگه دار."}});
LU(221,{use:{en:"Use it to say what makes you (or someone) furious — a recurring annoyance, an unfair act. Frame: 'Das bringt mich auf die Palme.' or 'Mit seiner Unpünktlichkeit bringt er mich auf die Palme.' Informal but not vulgar; friends and relaxed work talk.",fa:"برای گفتنِ چیزی که تو (یا کسی) را عصبانی می‌کند به‌کار ببر — آزارِ تکراری، کارِ ناعادلانه. قالب: «Das bringt mich auf die Palme.» غیررسمی اما رکیک نیست؛ دوستان و صحبتِ کاریِ راحت."},avoid:{en:"Two forms: 'jdn. auf die Palme bringen' (to infuriate) and 'auf der Palme sein' (to be furious). Pick the right one.",fa:"دو شکل: «jdn. auf die Palme bringen» (عصبانی‌کردن) و «auf der Palme sein» (عصبانی‌بودن). درست انتخاب کن."},mistake:{en:"Don't mix the two forms up.",fa:"دو شکل را قاطی نکن."}});
LU(222,{use:{en:"Use it to tell someone to stop exaggerating a small issue. Frame: 'Mach aus einer Mücke keinen Elefanten.' Gentle, common rebuke among friends, family and colleagues.",fa:"برای گفتنِ اینکه کسی مسئله‌ی کوچکی را بزرگ نکند به‌کار ببر. قالب: «Mach aus einer Mücke keinen Elefanten.» سرزنشِ ملایم و رایج بینِ دوستان، خانواده و همکاران."},avoid:{en:"It addresses exaggeration, not lying or drama in general.",fa:"درباره‌ی اغراق است، نه دروغ یا درام به‌طورِ کلی."},mistake:{en:"Mücke (mosquito) → Elefant (elephant): keep both nouns.",fa:"«Mücke» → «Elefant»: هر دو اسم را نگه دار."}});
LU(229,{use:{en:"Use it to call out someone flattering a person (often a boss/teacher) to gain favour. Frame: 'Er schmiert dem Chef ständig Honig um den Mund.' Negative, slightly mocking; informal.",fa:"برای اشاره به کسی که (اغلب به رئیس/معلم) چاپلوسی می‌کند تا نظرش را جلب کند به‌کار ببر. قالب: «Er schmiert dem Chef ständig Honig um den Mund.» منفی و کمی تمسخرآمیز؛ غیررسمی."},avoid:{en:"It implies insincerity — don't use it for genuine, sincere compliments.",fa:"معنایش تظاهر است — برای تعریفِ صادقانه به‌کارش نبر."},mistake:{en:"Verb 'schmieren' + 'um den Mund/ums Maul'.",fa:"فعل «schmieren» + «um den Mund»."}});
LU(231,{use:{en:"Use it when someone is cheated or out-manoeuvred in a deal/negotiation — overcharged, tricked, taken advantage of. Frame: 'Beim Autokauf hat er mich über den Tisch gezogen.' Strongly negative; informal.",fa:"وقتی کسی در معامله/مذاکره سرش کلاه می‌رود یا فریب می‌خورد به‌کار ببر — گران‌فروشی، حقه، سوءاستفاده. قالب: «Beim Autokauf hat er mich über den Tisch gezogen.» شدیداً منفی؛ غیررسمی."},avoid:{en:"It's a serious accusation of being cheated — not just a bad deal you regret.",fa:"اتهامِ جدیِ کلاه‌گذاشتن است — نه صرفاً معامله‌ی بدی که پشیمانی."},mistake:{en:"Fixed: 'über den Tisch ziehen'.",fa:"ثابت: «über den Tisch ziehen»."}});
LU(234,{use:{en:"Use it to reassure that everything is fine and smooth — no problems, all sorted. Frame: 'Keine Sorge, bei uns ist alles in Butter.' Light, friendly; everyday speech.",fa:"برای اطمینان‌دادن که همه‌چیز خوب و روان است به‌کار ببر — مشکلی نیست، همه‌چیز روبه‌راه. قالب: «Keine Sorge, bei uns ist alles in Butter.» سبک و دوستانه؛ گفتارِ روزمره."},avoid:{en:"Informal — in a formal status update say 'alles in Ordnung'.",fa:"غیررسمی — در گزارشِ رسمی «alles in Ordnung» بگو."},mistake:{en:"Fixed: 'alles in Butter'.",fa:"ثابت: «alles in Butter»."}});
LU(250,{use:{en:"Use it about easing initial awkwardness between strangers — at a party, a first meeting, a new group. Frame: 'Ein Witz half, das Eis zu brechen.' Neutral; works everywhere, including semi-formal.",fa:"درباره‌ی کم‌کردنِ ناجوریِ اولیه بینِ غریبه‌ها به‌کار ببر — در مهمانی، اولین دیدار، گروهِ جدید. قالب: «Ein Witz half, das Eis zu brechen.» خنثی؛ همه‌جا کار می‌کند، حتی نیمه‌رسمی."},avoid:{en:"It's about social tension between people — not literal ice or other tension.",fa:"درباره‌ی تنشِ اجتماعی بینِ آدم‌هاست — نه یخِ واقعی یا تنشِ دیگر."},mistake:{en:"Same image as English 'break the ice'.",fa:"همان تصویرِ «break the ice» انگلیسی."}});

/* ===== IDIOM DEEP USE 3 ===== */
LU(205,{use:{en:"Use it as dark, slangy humour to talk about dying/death in general or in films/games — 'to kick the bucket'. Frame: 'In dem Film beißen am Ende fast alle ins Gras.' Only among friends in a joking tone.",fa:"به‌عنوانِ شوخیِ سیاه و خودمانی برای حرف‌زدن درباره‌ی مردن به‌طورِ کلی یا در فیلم/بازی به‌کار ببر — «غزل خداحافظی». قالب: «In dem Film beißen am Ende fast alle ins Gras.» فقط بینِ دوستان و با لحنِ شوخی."},avoid:{en:"Never about a real person's death or to someone grieving — it's irreverent and would be hurtful.",fa:"هرگز درباره‌ی مرگِ واقعیِ کسی یا به فردِ سوگوار نگو — بی‌حرمتی است."},mistake:{en:"Keep 'ins Gras beißen' (bite into the grass).",fa:"«ins Gras beißen» را نگه دار."}});
LU(211,{use:{en:"Use it when you suspect (or accuse, jokingly) someone of telling you a tall tale or lie. Frame: 'Das glaub ich nicht — du willst mir einen Bären aufbinden!' Light and teasing, among friends.",fa:"وقتی مشکوکی (یا به‌شوخی متهم می‌کنی) که کسی برایت چاخان یا دروغ می‌گوید به‌کار ببر. قالب: «Das glaub ich nicht — du willst mir einen Bären aufbinden!» سبک و شوخ، بینِ دوستان."},avoid:{en:"It implies a playful lie/exaggeration — not a serious accusation of fraud.",fa:"معنایش دروغِ شوخی‌آمیز است — نه اتهامِ جدیِ کلاهبرداری."},mistake:{en:"Verb 'aufbinden', and it's 'einen Bären' (a bear).",fa:"فعل «aufbinden»، و «einen Bären» (یک خرس)."}});
LU(212,{use:{en:"Use it to tell someone (or admit) that giving up too soon would be a mistake — encourage them to keep going. Frame: 'Gib nicht auf, wirf nicht gleich die Flinte ins Korn.' Motivating; works with friends and at work.",fa:"برای گفتنِ اینکه تسلیمِ زودهنگام اشتباه است به‌کار ببر و تشویق به ادامه. قالب: «Gib nicht auf, wirf nicht gleich die Flinte ins Korn.» انگیزشی؛ با دوستان و در کار."},avoid:{en:"It's about giving up prematurely — not about a one-off decision to stop something sensibly.",fa:"درباره‌ی تسلیمِ زودهنگام است — نه تصمیمِ منطقیِ یک‌باره برای توقف."},mistake:{en:"Image: rifle into the grain. Keep 'ins Korn'.",fa:"تصویر: تفنگ در گندم. «ins Korn» را نگه دار."}});
LU(213,{use:{en:"Use it for the moment someone quits after trying — gives up a fight, project or effort. Frame: 'Nach dem dritten Versuch hat er das Handtuch geworfen.' Neutral; everyday and semi-formal.",fa:"برای لحظه‌ای که کسی بعد از تلاش کنار می‌کشد به‌کار ببر — رهاکردنِ یک مبارزه، پروژه یا تلاش. قالب: «Nach dem dritten Versuch hat er das Handtuch geworfen.» خنثی؛ روزمره و نیمه‌رسمی."},avoid:{en:"It means giving up after effort — not declining something from the start.",fa:"یعنی تسلیم بعد از تلاش — نه ردِ چیزی از همان اول."},mistake:{en:"Boxing image; 'das Handtuch werfen'.",fa:"تصویرِ بوکس؛ «das Handtuch werfen»."}});
LU(214,{use:{en:"Use it to complain that something/someone is annoying you. Frame: 'Dein ständiges Gerede geht mir auf den Keks.' Informal, friendly-blunt; among friends and relaxed colleagues.",fa:"برای شکایت از اینکه چیزی/کسی کلافه‌ات می‌کند به‌کار ببر. قالب: «Dein ständiges Gerede geht mir auf den Keks.» غیررسمی و راحت؛ بینِ دوستان و همکارانِ صمیمی."},avoid:{en:"It's casual; in a formal complaint use 'das stört mich'.",fa:"خودمانی است؛ در شکایتِ رسمی «das stört mich» بگو."},mistake:{en:"Playful variant of 'auf die Nerven gehen'.",fa:"شکلِ شوخِ «auf die Nerven gehen»."}});
LU(216,{use:{en:"Use it when a tricky, tense or dangerous situation finally gets resolved through effort or a clever solution. Frame: 'Mit dem Kompromiss haben wir die Kuh vom Eis geholt.' Neutral; common at work and in problem-solving.",fa:"وقتی موقعیتِ بغرنج، پرتنش یا خطرناک سرانجام با تلاش یا راه‌حلی هوشمندانه حل می‌شود به‌کار ببر. قالب: «Mit dem Kompromiss haben wir die Kuh vom Eis geholt.» خنثی؛ در کار و حلِ مسئله رایج."},avoid:{en:"It's about defusing a difficult situation — not everyday small tasks.",fa:"درباره‌ی خنثی‌کردنِ موقعیتِ سخت است — نه کارهای کوچکِ روزمره."},mistake:{en:"Image: getting a cow off thin ice.",fa:"تصویر: بیرون‌آوردنِ گاو از یخِ نازک."}});
LU(219,{use:{en:"Use it to say you'll overlook a small fault or let it slide. Frame: 'Der Lehrer hat bei dem Fehler ein Auge zugedrückt.' Neutral; works in most contexts including semi-formal.",fa:"برای گفتنِ اینکه از خطایِ کوچکی چشم‌پوشی می‌کنی به‌کار ببر. قالب: «Der Lehrer hat bei dem Fehler ein Auge zugedrückt.» خنثی؛ در بیشترِ موقعیت‌ها حتی نیمه‌رسمی."},avoid:{en:"It means tolerating a minor fault — not ignoring something serious.",fa:"یعنی تحملِ خطایِ کوچک — نه نادیده‌گرفتنِ چیزِ جدی."},mistake:{en:"'ein Auge zudrücken' (one eye), not 'beide'.",fa:"«ein Auge zudrücken» (یک چشم)، نه «beide»."}});
LU(220,{use:{en:"Use it to vouch strongly for someone's reliability or honesty — total trust. Frame: 'Für meinen Bruder leg ich die Hand ins Feuer.' Fairly strong; friends, family, references.",fa:"برای ضمانتِ محکمِ قابل‌اعتمادبودن یا صداقتِ کسی به‌کار ببر — اعتمادِ کامل. قالب: «Für meinen Bruder leg ich die Hand ins Feuer.» نسبتاً قوی؛ دوستان، خانواده، توصیه‌نامه."},avoid:{en:"Only use it when you're truly certain — it's a strong guarantee.",fa:"فقط وقتی واقعاً مطمئنی به‌کارش ببر — ضمانتِ قوی است."},mistake:{en:"'die Hand ins Feuer legen für jdn.'",fa:"«die Hand ins Feuer legen für jdn.»"}});
LU(223,{use:{en:"Use it to tell someone to run/hurry, or to say you ran fast. Frame: 'Nimm die Beine in die Hand, der Bus kommt!' Casual and a bit funny; among friends.",fa:"برای گفتنِ اینکه کسی بدود/عجله کند، یا اینکه خودت تند دویدی به‌کار ببر. قالب: «Nimm die Beine in die Hand, der Bus kommt!» خودمانی و کمی بامزه؛ بینِ دوستان."},avoid:{en:"Informal/playful — not for formal instructions.",fa:"غیررسمی و شوخ — نه برای دستورالعملِ رسمی."},mistake:{en:"Funny image of grabbing your legs to run.",fa:"تصویرِ بامزه‌ی گرفتنِ پاها برای دویدن."}});
LU(224,{use:{en:"Use it for the moment of sudden understanding — 'the penny drops'. Frame: 'Plötzlich ging mir ein Licht auf.' Neutral; everyday and semi-formal.",fa:"برای لحظه‌ی فهمِ ناگهانی به‌کار ببر — «دوزاری افتاد». قالب: «Plötzlich ging mir ein Licht auf.» خنثی؛ روزمره و نیمه‌رسمی."},avoid:{en:"It's a sudden realization — not gradual learning.",fa:"فهمِ ناگهانی است — نه یادگیریِ تدریجی."},mistake:{en:"'jdm. geht ein Licht auf' (Dativ).",fa:"«jdm. geht ein Licht auf» (داتیو)."}});
LU(225,{use:{en:"Use it to apologize for losing track mid-speech, or to describe it. Frame: 'Entschuldige, ich hab den Faden verloren.' Neutral; common in talks and conversations.",fa:"برای عذرخواهی بابتِ گم‌کردنِ رشته‌ی کلام در میانِ صحبت، یا توصیفِ آن به‌کار ببر. قالب: «Entschuldige, ich hab den Faden verloren.» خنثی؛ در سخنرانی و گفت‌وگو رایج."},avoid:{en:"It's about losing your train of thought — not losing an object.",fa:"درباره‌ی گم‌کردنِ رشته‌ی فکر است — نه گم‌کردنِ یک شیء."},mistake:{en:"'den Faden verlieren' (the thread).",fa:"«den Faden verlieren» (نخ/رشته)."}});

/* ===== IDIOM DEEP USE 4 ===== */
LU(226,{use:{en:"Use it (almost always negated) to say someone is so good that nobody can match them. Frame: 'In Mathe kann ihr keiner das Wasser reichen.' Neutral; everyday and semi-formal praise.",fa:"(تقریباً همیشه منفی) برای گفتنِ اینکه کسی آن‌قدر خوب است که هیچ‌کس به گردش نمی‌رسد به‌کار ببر. قالب: «In Mathe kann ihr keiner das Wasser reichen.» خنثی؛ تحسینِ روزمره و نیمه‌رسمی."},avoid:{en:"Almost always used in the negative ('keiner kann …'); rarely positive.",fa:"تقریباً همیشه منفی به‌کار می‌رود؛ به‌ندرت مثبت."},mistake:{en:"'jdm. das Wasser reichen können'.",fa:"«jdm. das Wasser reichen können»."}});
LU(227,{use:{en:"Use it to criticize stubbornness — forcing something that won't work. Frame: 'Du kannst nicht immer mit dem Kopf durch die Wand.' Neutral-to-friendly warning.",fa:"برای نقدِ یک‌دندگی به‌کار ببر — اصرار به کاری که جواب نمی‌دهد. قالب: «Du kannst nicht immer mit dem Kopf durch die Wand.» هشدارِ خنثی تا دوستانه."},avoid:{en:"It's about forcing the impossible — not about healthy determination.",fa:"درباره‌ی به‌زورْکردنِ کارِ ناممکن است — نه پشتکارِ سالم."},mistake:{en:"'mit dem Kopf durch die Wand wollen'.",fa:"«mit dem Kopf durch die Wand wollen»."}});
LU(228,{use:{en:"Use it for the family/group outsider who is seen negatively or differs from the rest. Frame: 'In der Familie war er immer das schwarze Schaf.' Neutral; everyday.",fa:"برای فردِ بیرون‌ازجمعِ خانواده/گروه که منفی دیده می‌شود یا با بقیه فرق دارد به‌کار ببر. قالب: «In der Familie war er immer das schwarze Schaf.» خنثی؛ روزمره."},avoid:{en:"It carries a negative judgment — don't use it neutrally for 'the unique one'.",fa:"قضاوتِ منفی دارد — برای «فردِ خاص» به‌صورتِ خنثی به‌کارش نبر."},mistake:{en:"'das schwarze Schaf'.",fa:"«das schwarze Schaf»."}});
LU(230,{use:{en:"Use it for suddenly listening closely when something interesting comes up. Frame: 'Als sein Name fiel, spitzte er die Ohren.' Neutral; everyday and narrative.",fa:"برای گوش‌تیزکردنِ ناگهانی وقتی چیزِ جالبی پیش می‌آید به‌کار ببر. قالب: «Als sein Name fiel, spitzte er die Ohren.» خنثی؛ روزمره و روایی."},avoid:{en:"It's about perking up to listen — not about literal ears.",fa:"درباره‌ی تیزکردنِ توجه برای شنیدن است — نه گوشِ واقعی."},mistake:{en:"'die Ohren spitzen'.",fa:"«die Ohren spitzen»."}});
LU(232,{use:{en:"Use it to propose settling things openly and honestly — clearing the air. Frame: 'Lass uns reinen Tisch machen und alles klären.' Neutral; works in relationships and at work.",fa:"برای پیشنهادِ حل‌وفصلِ صادقانه و باز به‌کار ببر — صاف‌کردنِ فضا. قالب: «Lass uns reinen Tisch machen und alles klären.» خنثی؛ در روابط و کار."},avoid:{en:"It's about honest resolution — not just tidying up.",fa:"درباره‌ی حلِ صادقانه است — نه صرفاً مرتب‌کردن."},mistake:{en:"'reinen Tisch machen'.",fa:"«reinen Tisch machen»."}});
LU(233,{use:{en:"Use it when you accept an unpleasant but necessary thing. Frame: 'Ich muss in den sauren Apfel beißen und es ihm sagen.' Neutral; everyday and work.",fa:"وقتی چیزِ ناخوشایند اما لازم را می‌پذیری به‌کار ببر. قالب: «Ich muss in den sauren Apfel beißen und es ihm sagen.» خنثی؛ روزمره و کار."},avoid:{en:"It's about forcing yourself to do something unpleasant — not literal apples.",fa:"درباره‌ی واداشتنِ خود به کارِ ناخوشایند است — نه سیبِ واقعی."},mistake:{en:"'in den sauren Apfel beißen'.",fa:"«in den sauren Apfel beißen»."}});
LU(235,{use:{en:"Use it to complain something is annoying you. Frame: 'Der geht mir mit seinen Fragen auf den Wecker.' Informal, friendly-blunt.",fa:"برای شکایت از اینکه چیزی کلافه‌ات می‌کند به‌کار ببر. قالب: «Der geht mir mit seinen Fragen auf den Wecker.» غیررسمی و راحت."},avoid:{en:"Casual variant of 'auf die Nerven gehen' — not for formal complaints.",fa:"شکلِ خودمانیِ «auf die Nerven gehen» — نه برای شکایتِ رسمی."},mistake:{en:"'auf den Wecker gehen'.",fa:"«auf den Wecker gehen»."}});
LU(236,{use:{en:"Use it to encourage someone to overcome pride or hesitation and do the hard thing — apologize, take a risk. Frame: 'Spring über deinen Schatten und entschuldige dich.' Encouraging; friends and coaching.",fa:"برای تشویقِ کسی به غلبه بر غرور یا تردید و انجامِ کارِ سخت به‌کار ببر — عذرخواهی، ریسک. قالب: «Spring über deinen Schatten und entschuldige dich.» تشویقی؛ دوستان و کوچینگ."},avoid:{en:"It's about overcoming your own reservations — not literal jumping.",fa:"درباره‌ی غلبه بر تردیدِ خود است — نه پریدنِ واقعی."},mistake:{en:"'über seinen Schatten springen'.",fa:"«über seinen Schatten springen»."}});
LU(237,{use:{en:"Use it for clumsy, tactless behaviour — someone heavy-handed in a delicate situation. Frame: 'Er benimmt sich wie ein Elefant im Porzellanladen.' Neutral; everyday.",fa:"برای رفتارِ بی‌ملاحظه و دست‌وپاچلفتی به‌کار ببر — کسی که در موقعیتِ ظریف خشن عمل می‌کند. قالب: «Er benimmt sich wie ein Elefant im Porzellanladen.» خنثی؛ روزمره."},avoid:{en:"It's about tactlessness — not about physical clumsiness only.",fa:"درباره‌ی بی‌ملاحظگی است — نه فقط دست‌وپاچلفتیِ فیزیکی."},mistake:{en:"'wie ein Elefant im Porzellanladen'.",fa:"«wie ein Elefant im Porzellanladen»."}});
LU(238,{use:{en:"Use it when someone figures out another's secret tricks or scheme. Frame: 'Die Polizei kam dem Betrüger auf die Schliche.' Neutral; everyday and crime/news.",fa:"وقتی کسی به کلک یا نقشه‌ی پنهانِ دیگری پی می‌برد به‌کار ببر. قالب: «Die Polizei kam dem Betrüger auf die Schliche.» خنثی؛ روزمره و خبری."},avoid:{en:"It's about uncovering tricks — not just learning a fact.",fa:"درباره‌ی کشفِ کلک است — نه صرفاً دانستنِ یک واقعیت."},mistake:{en:"'jdm. auf die Schliche kommen'.",fa:"«jdm. auf die Schliche kommen»."}});
LU(239,{use:{en:"Use it about cutting back financially in hard times. Frame: 'Dieses Jahr müssen wir den Gürtel enger schnallen.' Neutral; everyday and news.",fa:"درباره‌ی صرفه‌جوییِ مالی در دورانِ سخت به‌کار ببر. قالب: «Dieses Jahr müssen wir den Gürtel enger schnallen.» خنثی؛ روزمره و خبری."},avoid:{en:"Specifically about money/spending — not effort in general.",fa:"به‌طورِ خاص درباره‌ی پول/خرج است — نه تلاش به‌طورِ کلی."},mistake:{en:"'den Gürtel enger schnallen'.",fa:"«den Gürtel enger schnallen»."}});
LU(240,{use:{en:"Use it to say someone far surpasses others. Frame: 'Ihr Talent stellt alle anderen in den Schatten.' Neutral; praise, everyday and semi-formal.",fa:"برای گفتنِ اینکه کسی خیلی از دیگران بهتر است به‌کار ببر. قالب: «Ihr Talent stellt alle anderen in den Schatten.» خنثی؛ تحسین، روزمره و نیمه‌رسمی."},avoid:{en:"It's about outshining — don't confuse with 'überschatten' (to cast gloom over).",fa:"درباره‌ی پیشی‌گرفتن است — با «überschatten» (سایه‌ی غم انداختن) اشتباه نگیر."},mistake:{en:"'jdn. in den Schatten stellen'.",fa:"«jdn. in den Schatten stellen»."}});

/* ===== IDIOM DEEP USE 5 ===== */
LU(241,{use:{en:"Use it for secret, smug glee — quietly enjoying something, often at someone else's expense. Frame: 'Er lachte sich ins Fäustchen über ihren Fehler.' Neutral-to-informal; narrative and everyday.",fa:"برای شادیِ پنهان و موذیانه به‌کار ببر — لذتِ بی‌صدا، اغلب به‌قیمتِ دیگری. قالب: «Er lachte sich ins Fäustchen über ihren Fehler.» خنثی تا غیررسمی؛ روایی و روزمره."},avoid:{en:"It's hidden gloating — not open laughter.",fa:"پوزخندِ پنهان است — نه خنده‌ی آشکار."},mistake:{en:"'sich ins Fäustchen lachen'.",fa:"«sich ins Fäustchen lachen»."}});
LU(242,{use:{en:"Use it for giving someone a stern telling-off. Frame: 'Der Chef hat ihm gehörig die Leviten gelesen.' Neutral; everyday, work, narrative.",fa:"برای توبیخِ سختِ کسی به‌کار ببر. قالب: «Der Chef hat ihm gehörig die Leviten gelesen.» خنثی؛ روزمره، کار، روایی."},avoid:{en:"It's a strong scolding — not gentle feedback.",fa:"سرزنشِ شدید است — نه بازخوردِ ملایم."},mistake:{en:"'jdm. die Leviten lesen'.",fa:"«jdm. die Leviten lesen»."}});
LU(243,{use:{en:"Use it to tell someone to stay realistic and not overhype or overreact. Frame: 'Bleib mal auf dem Teppich, so toll war es nicht.' Friendly-blunt; among friends and relaxed colleagues.",fa:"برای گفتنِ اینکه کسی واقع‌بین بماند و شلوغ یا افراطی نکند به‌کار ببر. قالب: «Bleib mal auf dem Teppich, so toll war es nicht.» راحت و دوستانه؛ بینِ دوستان و همکارانِ صمیمی."},avoid:{en:"It tells someone to stay grounded — don't use it to dismiss real achievements harshly.",fa:"به طرف می‌گوید واقع‌بین بماند — برای کوچک‌شمردنِ تندِ دستاوردِ واقعی به‌کارش نبر."},mistake:{en:"'auf dem Teppich bleiben'.",fa:"«auf dem Teppich bleiben»."}});
LU(244,{use:{en:"Use it as a firm reminder/warning to remember something well. Frame: 'Das kannst du dir hinter die Ohren schreiben!' Informal, slightly stern; friends, family, teachers.",fa:"به‌عنوانِ یادآوری/هشدارِ محکم برای خوب به‌خاطرسپردنِ چیزی به‌کار ببر. قالب: «Das kannst du dir hinter die Ohren schreiben!» غیررسمی و کمی جدی؛ دوستان، خانواده، معلم."},avoid:{en:"Often a warning ('remember this!') — not neutral note-taking.",fa:"اغلب هشدار است («اینو یادت باشه!») — نه یادداشتِ خنثی."},mistake:{en:"'sich etwas hinter die Ohren schreiben'.",fa:"«sich etwas hinter die Ohren schreiben»."}});
LU(245,{use:{en:"Use it to propose honest, direct, no-nonsense talk — cut to the chase. Frame: 'Lass uns mal Tacheles reden.' Informal but widely used, incl. business.",fa:"برای پیشنهادِ صحبتِ صادقانه، مستقیم و بی‌حاشیه به‌کار ببر — برو سرِ اصلِ مطلب. قالب: «Lass uns mal Tacheles reden.» غیررسمی اما پرکاربرد، حتی در کار."},avoid:{en:"It means plain, honest talk — not loud or rude talk.",fa:"یعنی حرفِ صریح و صادقانه — نه پرسروصدا یا گستاخانه."},mistake:{en:"From Yiddish 'tacheles' (purpose).",fa:"از ییدیشِ «tacheles» (هدف)."}});
LU(246,{use:{en:"Use it for something/someone that constantly bothers or irritates you. Frame: 'Die Baustelle ist den Anwohnern ein Dorn im Auge.' Neutral; everyday and news.",fa:"برای چیزی/کسی که مدام آزارت می‌دهد به‌کار ببر. قالب: «Die Baustelle ist den Anwohnern ein Dorn im Auge.» خنثی؛ روزمره و خبری."},avoid:{en:"It's a persistent irritation — not a one-off annoyance.",fa:"آزارِ همیشگی است — نه دلخوریِ یک‌باره."},mistake:{en:"'jdm. ein Dorn im Auge sein'.",fa:"«jdm. ein Dorn im Auge sein»."}});
LU(247,{use:{en:"Use it to say who is in charge / most important in a group. Frame: 'Im Team spielt sie eindeutig die erste Geige.' Neutral; everyday and work.",fa:"برای گفتنِ اینکه چه کسی در گروه مسئول/مهم‌ترین است به‌کار ببر. قالب: «Im Team spielt sie eindeutig die erste Geige.» خنثی؛ روزمره و کار."},avoid:{en:"It's about leading/being top — opposite 'zweite Geige spielen' (to play second fiddle).",fa:"درباره‌ی رهبری/درصدربودن است — متضادِ «zweite Geige spielen»."},mistake:{en:"'die erste Geige spielen'.",fa:"«die erste Geige spielen»."}});
LU(249,{use:{en:"Use it for probing/grilling someone closely to get the truth. Frame: 'Im Interview haben sie ihm gründlich auf den Zahn gefühlt.' Neutral; interviews, journalism, everyday.",fa:"برای سبک‌سنگین‌کردن/زیرِ سؤال‌بردنِ دقیقِ کسی برای رسیدن به حقیقت به‌کار ببر. قالب: «Im Interview haben sie ihm gründlich auf den Zahn gefühlt.» خنثی؛ مصاحبه، روزنامه‌نگاری، روزمره."},avoid:{en:"It's about questioning someone hard — not literal teeth/dentist.",fa:"درباره‌ی سؤال‌پیچ‌کردنِ کسی است — نه دندان/دندان‌پزشک."},mistake:{en:"'jdm. auf den Zahn fühlen'.",fa:"«jdm. auf den Zahn fühlen»."}});

efühl, die wollen mich einfach **ausquetschen** wie 'ne Zitrone."}, {"s": 0, "t": "Lass dich bloß nicht verarschen. **Keine zehn Pferde bringen mich dahin**, in so 'nen toxischen Laden zu gehen."}, {"s": 1, "t": "Ich sag's dir. Wenn der Vibe nicht stimmt, bin ich schneller wieder weg, als die gucken können."}, {"s": 0, "t": "Hast du am Ende noch kluge Fragen gestellt? Das finden die doch immer toll."}, {"s": 1, "t": "Klar. Ich hab sie gefragt, warum die Stelle frei geworden ist."}, {"s": 0, "t": "Oh, fies! Da hast du echt **den Finger auf die Wunde gelegt**. Was haben sie gesagt?"}, {"s": 1, "t": "Sie haben ziemlich unklar geantwortet. Von wegen \"berufliche Neuorientierung des Vorgängers\"."}, {"s": 0, "t": "Übersetzt: Er hatte einen Burnout oder hat kapiert, dass der Laden ein sinkendes Schiff ist."}, {"s": 1, "t": "Genau das dachte ich mir auch. Der Typ ist bestimmt **Hals über Kopf** geflohen."}, {"s": 0, "t": "Da ist hundertpro was **faul**. Aber gut, dass du das gefragt hast."}, {"s": 1, "t": "Fand ich auch. Am Ende hab ich noch gefragt, wie die Einarbeitung läuft."}, {"s": 0, "t": "Und? Gibt's da einen Plan oder werfen die dich direkt **ins kalte Wasser**?"}, {"s": 1, "t": "Sie meinten, es ist \"Learning by Doing\". Also ja, eiskaltes Wasser."}, {"s": 0, "t": "[[Cringe]]. Da stehst du dann da [[wie die Kuh vorm neuen Tor]] und keiner hilft dir."}, {"s": 1, "t": "Exakt das ist meine Befürchtung. Ich hasse sowas."}, {"s": 0, "t": "Ich auch. Wenn man keine gescheite Einweisung kriegt, ist man ja komplett [[lost]]."}, {"s": 1, "t": "Vor allem, weil man dann für jeden Fehler direkt riesigen Ärger kriegt."}, {"s": 0, "t": "Wie lange ging das ganze Theater am Ende?"}, {"s": 1, "t": "Fast eine Stunde. Gegen Ende hab ich echt [[den Faden verloren]], war total unkonzentriert."}, {"s": 0, "t": "Kann ich verstehen. Nach einer Stunde Dauerfeuer ist man mental einfach komplett durch."}, {"s": 1, "t": "Ja, ich war echt froh, als ich endlich wieder draußen an der frischen Luft war."}, {"s": 0, "t": "Da ist dir sicher **ein Stein vom Herzen gefallen**, was?"}, {"s": 1, "t": "Riesiger Stein! Ich bin direkt zur U-Bahn gerannt, wollte nur noch weg da."}, {"s": 0, "t": "Wann wollen sie sich denn melden? Haben sie was Konkretes gesagt?"}, {"s": 1, "t": "Sie meinten \"Ende der Woche\". Aber du weißt ja, wie das ist."}, {"s": 0, "t": "Ja, das kann auch Ende nächsten Monats heißen."}, {"s": 1, "t": "Eben. Wenn sie sich nicht melden, ist mir das auch egal."}, {"s": 0, "t": "Stell dir vor, sie rufen morgen an und wollen dich sofort haben."}, {"s": 1, "t": "Dann muss ich echt gut überlegen. Hab irgendwie keinen Bock auf die [[Karen]]."}, {"s": 0, "t": "Das Ding ist: Wenn du den Job annimmst, verdienst du wenigstens erstmal [[Kohle]]."}, {"s": 1, "t": "Schon. Ich bin momentan echt [[arm wie eine Kirchenmaus]]."}, {"s": 0, "t": "Eben. Zur Not machst du das ein paar Monate und bewirbst dich parallel weiter."}, {"s": 1, "t": "Auch wieder wahr. Ist ja kein Vertrag fürs Leben."}, {"s": 0, "t": "Du hast das echt super gemacht, [[Bro]]. Bewerbungsgespräche sind immer heftig."}, {"s": 1, "t": "Danke dir! Es tut echt gut, sich das mal auszusprechen."}, {"s": 0, "t": "Dafür sind Freunde doch da. [[Eine Hand wäscht die andere]]."}, {"s": 1, "t": "[[Ehrenfrau]]! Ohne dich wär ich nach so 'nem Tag echt komplett **depri**."}, {"s": 0, "t": "Ach Quatsch, du bist so ein [[Macher]], du ziehst dein Ding immer durch."}, {"s": 1, "t": "Versuche ich zumindest. Aber manchmal fühhl ich mich eher wie ein Betrüger."}, {"s": 0, "t": "Lass das. Du hast in deinem Studium so viel [[auf dem Kasten]], die wären dumm, wenn sie dich nicht nehmen."}, {"s": 1, "t": "Hoffen wir's. Aber wenn die lieber so 'nen Assistenten wollen, sollen sie halt."}, {"s": 0, "t": "Eben. Jemand, der nur **nach dem Mund redet**, bringt keine Firma weiter."}, {"s": 1, "t": "Das kapieren viele [[Boomer]]-Chefs aber leider nicht."}, {"s": 0, "t": "Das stimmt. Die wollen oft nur Leute, die zu allem Ja sagen."}, {"s": 1, "t": "Na ja, ich bin definitiv keiner. Dafür bin ich zu sehr auf Konfrontation gebürstet."}, {"s": 0, "t": "Ist auch gut so. Hast du ihnen eigentlich Fragen zu den Weiterbildungen gestellt?"}, {"s": 1, "t": "Ja, aber das haben die komplett abgelehnt. Stand \"nicht im Budget\"."}, {"s": 0, "t": "Nicht im Budget? Was für ein [[Saftladen]]."}, {"s": 1, "t": "Meine Rede. Da kannst du dich wahrscheinlich null weiterentwickeln."}, {"s": 0, "t": "Da bist du dann nur **das fünfte Rad am Wagen**."}, {"s": 1, "t": "Ganz genau. Ein billiger Assistent, der die ganze nervige Arbeit für sie erledigt."}, {"s": 0, "t": "Das hast du nicht nötig. Lass dich echt nicht ausnutzen."}, {"s": 1, "t": "Mach ich nicht. Wenn's hart auf hart kommt, geb ich denen **einen Korb**."}, {"s": 0, "t": "Wär auch ein geiler Move. Stell dir das Gesicht von dem HR-Typen vor!"}, {"s": 1, "t": "Haha, ja! Der würde wahrscheinlich komplett **aus der Haut fahren**."}, {"s": 0, "t": "Der Typ denkt bestimmt, jeder reißt sich um einen Job bei ihnen."}, {"s": 1, "t": "[[Safe]]. Der saß da wie der König von Deutschland."}, {"s": 0, "t": "Aber hey, du hast es überstanden. Das ist das Wichtigste."}, {"s": 1, "t": "Oh ja. Und jetzt hab ich mir echt 'ne Pause verdient."}, {"s": 0, "t": "Absolut! Sollen wir heute Abend was bestellen?"}, {"s": 1, "t": "Mega Idee. Ich hab so krass [[Kohldampf]]."}, {"s": 0, "t": "Worauf hast du Bock? [[Mafiatorte]] oder lieber Sushi?"}, {"s": 1, "t": "Pizza! Und zwar mit extra Käse. Ich brauch heute gutes Essen."}, {"s": 0, "t": "Abgemacht. Ich ruf gleich bei unserer Stamm-**Pizzerei** an."}, {"s": 1, "t": "Du bist ein Schatz. Hast du auch Hunger?"}, {"s": 0, "t": "Klar, ich hab vorhin nur einen Apfel **verputzt**. Hab auch voll das Loch im Bauch."}, {"s": 1, "t": "Dann lass uns direkt zwei Familienpizzen ordern."}, {"s": 0, "t": "Da sind **die Augen wieder größer als der Magen**, was?"}, {"s": 1, "t": "Lass mich, ich muss meinen Frust wegessen."}, {"s": 0, "t": "Haha, alles gut. [[Gönn dir]]!"}, {"s": 1, "t": "Hast du eigentlich morgen früh Uni?"}, {"s": 0, "t": "Nee, ich hab morgen komplett frei. Kann also schön ausschlafen."}, {"s": 1, "t": "Geil. Dann können wir heute Abend auch noch ein bisschen an der Konsole zocken."}, {"s": 0, "t": "Auf jeden Fall! Ich mach dich bei Mario Kart sowieso wieder komplett platt."}, {"s": 1, "t": "Träum weiter! Heute bin ich voll im [[Gommemode]], da hast du keine Chance."}, {"s": 0, "t": "Pff, das werden wir ja noch sehen. Ich steck dich locker **in den Sack**."}, {"s": 1, "t": "Große Worte! Aber ernsthaft, danke fürs Zuhören vorhin."}, {"s": 0, "t": "Immer doch. Es ist echt wichtig, dass man nach so einem Stress mal entspannt."}, {"s": 1, "t": "Ja, ich hab das Gefühl, mein Kopf war kurz vorm Platzen."}, {"s": 0, "t": "[[Synapsenfasching]] pur, oder?"}, {"s": 1, "t": "Genau das. Aber jetzt geht's schon viel besser."}, {"s": 0, "t": "Siehst du. Und wenn die sich melden, gucken wir einfach, was los ist."}, {"s": 1, "t": "Richtig. Ich lass das jetzt einfach alles auf mich zukommen."}, {"s": 0, "t": "So ist es richtig. [[Hakuna Matata]]!"}, {"s": 1, "t": "Bester Spruch. Stress bringt eh nichts."}, {"s": 0, "t": "Sag ich doch immer. Wer sich zu viele Sorgen macht, kriegt nur **graue Haare**."}, {"s": 1, "t": "Das will ich echt vermeiden. Bin eh schon gestresst genug."}, {"s": 0, "t": "Also, Pizza ist bestellt. Dauert etwa dreißig Minuten."}, {"s": 1, "t": "Perfekt. Dann hol ich schon mal die Controller raus."}, {"s": 0, "t": "Mach das. Und ich hol noch zwei Bier aus dem Kühlschrank."}, {"s": 1, "t": "Du liest mir echt jeden Wunsch von den Augen ab."}, {"s": 0, "t": "Tja, dafür sind Mitbewohner doch da. Auf dein überstandenes Gespräch!"}, {"s": 1, "t": "Auf uns! Und darauf, dass ich hoffentlich bald nicht mehr **pleite** bin."}, {"s": 0, "t": "Prost! Lass es dir schmecken!"}, {"s": 1, "t": "Prost, [[Bro]]! Auf einen entspannten Abend!"}], "gloss": {"schieß los": {"de": "leg los/erzähl", "en": "fire away" function renderDialogues(root){
  root.innerHTML=`<div class="page-head"><div class="kicker">💬 ${DIALOGUES.length} Stories</div><h1>${t("dia_title")}</h1><p>${t("dia_sub")}</p></div><div id="diaCats"></div>`;
  const host=$("#diaCats");
  Object.keys(DIA_CATS).forEach(cat=>{
    const list=DIALOGUES.filter(d=>d.cat===cat);if(!list.length)return;
    const sec=el("div","dia-cat");
    sec.innerHTML=`<h2>${DIA_CATS[cat].e} ${L(DIA_CATS[cat])}</h2><div class="dia-grid">${list.map(d=>`
      <div class="dia-card" data-dia="${d.id}"><span class="num">${String(d.id).padStart(2,'0')}</span><span class="e">${d.emoji}</span>
        <span class="t">${esc(L(d.title))}</span><span class="d">${d.chars.map(c=>c.tag).join(" · ")}</span>
        ${S.diaRead.includes(d.id)?'<span class="chip core" style="margin-top:4px">✓ gelesen</span>':'<span class="chip" style="margin-top:4px">'+d.turns.length+' Zeilen</span>'}</div>`).join("")}</div>`;
    host.appendChild(sec);
  });
  $$('[data-dia]').forEach(b=>b.onclick=()=>openDialogue(+b.dataset.dia));
}
function renderTurn(d,turn){
  let txt=esc(turn.t).replace(/\[\[(.+?)\]\]/g,(m,w)=>`<span class="tap" data-w="${w}">${w}</span>`).replace(/\*\*(.+?)\*\*/g,(m,w)=>`<b class="hl">${w}</b>`);
  const ch=d.chars[turn.s];const right=turn.s===1;const time=turn.time?`<div class="time">${turn.time} ✓✓</div>`:"";
  return `<div class="bubble-row ${right?'right':''}"><div class="avatar" style="background:${ch.color}">${esc(ch.name[0])}</div>
    <div class="bubble"><div class="nm">${esc(ch.name)} · ${esc(ch.tag)}</div><div class="tx">${txt}</div>${time}</div></div>`;
}

  let grid="";for(let g=1;g<=3;g++){const rr=R*g/3;grid+=`<polygon points="${labels.map((m,i)=>{const ang=-Math.PI/2+i*2*Math.PI/N;return (cx+Math.cos(ang)*rr)+","+(cy+Math.sin(ang)*rr);}).join(" ")}" fill="none" stroke="var(--border)" stroke-width="1"/>`;}

      if(hero.querySelector('.skyline-wrap'))return;
      const wrap=document.createElement('div');
      wrap.className='skyline-wrap';
      wrap.innerHTML=BERLIN_SKYLINE;
      hero.appendChild(wrap);
    });
  }

  function injectSpeechBubbles(){
    document.querySelectorAll('.shero,.hero').forEach(hero=>{
      if(hero.querySelector('.speech-floats'))return;
      const container=document.createElement('div');
      container.className='speech-floats';
      for(let i=0;i<5;i++){
        const phrase=GERMAN_PHRASES[Math.floor(Math.random()*GERMAN_PHRASES.length)];
        const bubble=document.createElement('div');
        bubble.className='speech-float';
        bubble.innerHTML=`<span class="sf-de">${phrase.de}</span>`;
        bubble.style.cssText=`left:${10+Math.random()*75}%;bottom:${Math.random()*30}%;animation-duration:${12+Math.random()*10}s;animation-delay:${Math.random()*8}s;font-size:${.7+Math.random()*.3}rem`;
        container.appendChild(bubble);
      }
      hero.appendChild(container);
    });
  }

  function injectCultureIcons(){
    document.querySelectorAll('.shero,.hero').forEach(hero=>{
      if(hero.querySelector('.culture-floats'))return;
      const container=document.createElement('div');
      container.className='culture-floats';
      for(let i=0;i<6;i++){
        const icon=document.createElement('div');
        icon.className='culture-icon';
        icon.textContent=CULTURE_ICONS[Math.floor(Math.random()*CULTURE_ICONS.length)];
        icon.style.cssText=`left:${5+Math.random()*85}%;bottom:${-10+Math.random()*20}%;animation-duration:${14+Math.random()*12}s;animation-delay:${Math.random()*10}s;font-size:${1.2+Math.random()*.8}rem`;
        container.appendChild(icon);
      }
      hero.appendChild(container);
    });
  }

  function injectOrbs(){
    document.querySelectorAll('.shero,.hero').forEach(hero=>{
      if(hero.querySelector('.orb'))return;
      const orbs=[
        {cls:'orb orb-red',css:'width:200px;height:200px;top:-40px;right:10%'},
        {cls:'orb orb-gold',css:'width:160px;height:160px;bottom:-30px;left:15%'},
        {cls:'orb orb-blue',css:'width:140px;height:140px;top:30%;right:30%'}
      ];
      orbs.forEach(o=>{
        const el=document.createElement('div');
        el.className=o.cls;
        el.style.cssText=o.css;
        hero.appendChild(el);
      });
    });
  }

  function injectFlagRibbon(){
    document.querySelectorAll('.shero,.hero').forEach(hero=>{
      if(hero.querySelector('.flag-ribbon'))return;
      const ribbon=document.createElement('div');
      ribbon.className='flag-ribbon';
      ribbon.innerHTML=`<svg viewBox="0 0 2400 8" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,4 Q150,0 300,4 Q450,8 600,4 Q750,0 900,4 Q1050,8 1200,4 Q1350,0 1500,4 Q1650,8 1800,4 Q1950,0 2100,4 Q2250,8 2400,4" stroke="#16161D" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M0,4 Q150,0 300,4 Q450,8 600,4 Q750,0 900,4 Q1050,8 1200,4 Q1350,0 1500,4 Q1650,8 1800,4 Q1950,0 2100,4 Q2250,8 2400,4" stroke="#E1001A" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="200 400" stroke-dashoffset="0"><animate attributeName="stroke-dashoffset" values="0;-600" dur="4s" repeatCount="indefinite"/></path>
        <path d="M0,4 Q150,0 300,4 Q450,8 600,4 Q750,0 900,4 Q1050,8 1200,4 Q1350,0 1500,4 Q1650,8 1800,4 Q1950,0 2100,4 Q2250,8 2400,4" stroke="#FFCB05" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="200 400" stroke-dashoffset="-200"><animate attributeName="stroke-dashoffset" values="-200;-800" dur="4s" repeatCount="indefinite"/></path>
      </svg>`;
      hero.style.position='relative';
      const tickerEl=hero.querySelector('.slang-ticker');
      if(tickerEl)hero.insertBefore(ribbon,tickerEl);
      else hero.appendChild(ribbon);
    });
  }

  function injectGlowDividers(){
    document.querySelectorAll('.page-head').forEach(ph=>{
      if(ph.querySelector('.glow-divider'))return;
      const hr=document.createElement('hr');
      hr.className='glow-divider';
      ph.appendChild(hr);
    });
  }

  function injectSplashEnhancements(){
    const sp=document.getElementById('splash');
    if(!sp||sp.querySelector('.splash-ring'))return;
    for(let i=0;i<2;i++){
      const ring=document.createElement('div');
      ring.className='splash-ring';
      ring.style.cssText=i===0?'':'';
      sp.appendChild(ring);
    }
    const sky=document.createElement('div');
    sky.className='splash-skyline';
    sky.innerHTML=BERLIN_SKYLINE;
    sp.appendChild(sky);
  }

  function injectWaveforms(){
    document.querySelectorAll('.aud-panel .lab').forEach(lab=>{
      if(lab.querySelector('.waveform'))return;
      const wf=document.createElement('span');
      wf.className='waveform';
      wf.innerHTML='<span class="bar"></span>'.repeat(7);
      lab.appendChild(wf);
    });
  }

  function addBadgeShine(){
    document.querySelectorAll('.lvl-badge,.coin-sym').forEach(el=>{
      if(!el.classList.contains('badge-shine'))el.classList.add('badge-shine');
    });
  }

  function injectAllMotionGraphics(){
    injectSkyline();
    injectSpeechBubbles();
    injectCultureIcons();
    injectOrbs();
    injectFlagRibbon();
    injectGlowDividers();
    injectWaveforms();
    addBadgeShine();
  }

  injectSplashEnhancements();
  const motionObs=new MutationObserver(()=>setTimeout(injectAllMotionGraphics,150));
  motionObs.observe(document.getElementById("app")||document.body,{childList:true,subtree:true});
  setTimeout(injectAllMotionGraphics,400);
})();
</script>
</body>
</html>
